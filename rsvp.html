<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davetiye — LCV</title>
    <meta name="robots" content="noindex">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js"></script>
    <link rel="stylesheet" href="shared.css?v=3">
    <style>
        body{background:linear-gradient(165deg,#f7f0e4,#fdfbf7 45%,#f2e7d8);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 16px}
        .invite{background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);border:1px solid var(--gray-200);border-radius:24px;padding:38px 26px 30px;max-width:420px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(168,129,79,0.16)}
        .inv-amp{font-family:var(--serif);font-size:30px;color:var(--gold);letter-spacing:2px}
        .inv-amp::after{content:'';display:block;width:48px;height:1px;background:var(--gold-light);margin:12px auto}
        .inv-names{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:1px;color:var(--gray-900);line-height:1.25}
        .inv-meta{font-size:13px;color:var(--gray-500);margin-top:10px;letter-spacing:0.4px;line-height:1.6}
        .inv-meta strong{color:var(--gold);font-weight:600}
        .inv-days{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--gold);margin-top:8px}
        .inv-hr{width:100%;height:1px;background:var(--gray-100);margin:22px 0}
        .inv-guest{font-size:14px;color:var(--gray-700);line-height:1.6}
        .inv-guest strong{font-family:var(--serif);font-size:19px;color:var(--gray-900);display:block;margin-bottom:2px}
        .inv-q{font-family:var(--serif);font-size:19px;color:var(--gray-900);margin:18px 0 14px}

        .choice{display:flex;gap:10px;margin-bottom:16px}
        .choice button{flex:1;padding:14px 8px;border-radius:14px;border:1.5px solid var(--gray-200);background:white;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);color:var(--gray-600);transition:all 0.15s}
        .choice button.sel-yes{border-color:var(--green);background:var(--green-bg);color:var(--green)}
        .choice button.sel-no{border-color:var(--red);background:var(--red-bg);color:var(--red)}
        .choice button:active{transform:scale(0.97)}

        .party{display:none;align-items:center;justify-content:center;gap:14px;margin-bottom:16px}
        .party.show{display:flex}
        .party label{font-size:13px;color:var(--gray-500)}
        .party .p-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--gray-200);background:white;font-size:18px;cursor:pointer;color:var(--gray-600)}
        .party .p-btn:active{background:var(--gray-50)}
        .party .p-num{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--gray-900);min-width:34px}

        .note-field{width:100%;border:1.5px solid var(--gray-200);border-radius:12px;padding:11px 13px;font-size:14px;outline:none;font-family:var(--sans);resize:vertical;min-height:54px;margin-bottom:16px;background:white;color:var(--gray-900)}
        .note-field:focus{border-color:var(--gold)}

        .send-btn{width:100%;padding:15px;border:none;border-radius:14px;background:var(--gold);color:white;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans)}
        .send-btn:active{opacity:0.85}
        .send-btn[disabled]{opacity:0.45;cursor:default}

        .done-icon{font-size:40px;margin-bottom:10px}
        .done-title{font-family:var(--serif);font-size:23px;font-weight:600;margin-bottom:8px}
        .done-text{font-size:14px;color:var(--gray-600);line-height:1.6;margin-bottom:20px}
        .change-btn{background:none;border:none;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;font-family:var(--sans)}

        .err-title{font-family:var(--serif);font-size:22px;margin-bottom:8px}
        .err-text{font-size:14px;color:var(--gray-500)}
        #inv-loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:30px 0}
    </style>
</head>
<body>

<div class="invite" id="invite">
    <div id="inv-loading"><div class="spinner"></div></div>
</div>

<script>
firebase.initializeApp(window.FIREBASE_CONFIG);
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const wid = params.get('w');
const token = params.get('t');

const MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const DAYS = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];

let docRef = null;
let rsvp = null;          // doc data
let selStatus = null;     // 'Katilacak' | 'Katilmayacak'
let partySize = 1;

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function parseLocalDate(s){
    if(!s) return null;
    const p = s.split('-').map(Number);
    if(p.length!==3 || !p[0]) return null;
    return new Date(p[0], p[1]-1, p[2]);
}

function showError(){
    document.getElementById('invite').innerHTML =
        '<div class="inv-amp">&amp;</div>' +
        '<div class="err-title">Bağlantı geçersiz</div>' +
        '<div class="err-text">Bu davet bağlantısı bulunamadı. Lütfen size gönderilen bağlantıyı kontrol edin ya da çiftimizle iletişime geçin.</div>';
}

function headerHTML(){
    const date = parseLocalDate(rsvp.weddingDate);
    let meta = '';
    let days = '';
    if(date){
        meta = date.getDate()+' '+MONTHS[date.getMonth()]+' '+date.getFullYear()+', '+DAYS[date.getDay()];
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const diff = Math.round((date - today)/864e5);
        if(diff > 1) days = '<div class="inv-days">'+diff+' gün kaldı</div>';
        else if(diff === 1) days = '<div class="inv-days">Yarın!</div>';
        else if(diff === 0) days = '<div class="inv-days">Bugün!</div>';
    }
    if(rsvp.venue) meta += (meta?' &middot; ':'') + '<strong>'+esc(rsvp.venue)+'</strong>';
    return '<div class="inv-amp">&amp;</div>' +
        '<div class="inv-names">'+esc(rsvp.coupleNames||'Düğünümüz')+'</div>' +
        '<div class="inv-meta">'+meta+'</div>' + days;
}

function renderForm(){
    partySize = rsvp.partySize || 1;
    selStatus = (rsvp.status==='Katilacak'||rsvp.status==='Katilmayacak') ? rsvp.status : null;
    document.getElementById('invite').innerHTML = headerHTML() +
        '<div class="inv-hr"></div>' +
        '<div class="inv-guest"><strong>Sayın '+esc(rsvp.guestName||'Misafirimiz')+'</strong>Mutlu günümüzde sizi de aramızda görmekten onur duyarız.</div>' +
        '<div class="inv-q">Katılım durumunuzu bildirir misiniz?</div>' +
        '<div class="choice">' +
            '<button id="btn-yes" onclick="choose(\'Katilacak\')">🤍 Katılacağız</button>' +
            '<button id="btn-no" onclick="choose(\'Katilmayacak\')">Katılamayacağız</button>' +
        '</div>' +
        '<div class="party" id="party">' +
            '<label>Kaç kişi?</label>' +
            '<button class="p-btn" onclick="bump(-1)">−</button>' +
            '<span class="p-num" id="p-num">'+partySize+'</span>' +
            '<button class="p-btn" onclick="bump(1)">+</button>' +
        '</div>' +
        '<textarea class="note-field" id="note" placeholder="İletmek istediğiniz bir not (isteğe bağlı)...">'+esc(rsvp.note||'')+'</textarea>' +
        '<button class="send-btn" id="send" onclick="submit()" disabled>Yanıtı Gönder</button>';
    if(selStatus) choose(selStatus);
}

function choose(s){
    selStatus = s;
    document.getElementById('btn-yes').classList.toggle('sel-yes', s==='Katilacak');
    document.getElementById('btn-no').classList.toggle('sel-no', s==='Katilmayacak');
    document.getElementById('party').classList.toggle('show', s==='Katilacak');
    document.getElementById('send').disabled = false;
}

function bump(d){
    partySize = Math.min(20, Math.max(1, partySize + d));
    document.getElementById('p-num').textContent = partySize;
}

function submit(){
    if(!selStatus) return;
    const btn = document.getElementById('send');
    btn.disabled = true;
    btn.textContent = 'Gönderiliyor...';
    docRef.update({
        status: selStatus,
        partySize: partySize,
        note: (document.getElementById('note').value||'').trim().substring(0,500),
        respondedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>{
        rsvp.status = selStatus;
        rsvp.partySize = partySize;
        rsvp.respondedAt = true;
        renderDone();
    }).catch((e)=>{
        console.error(e);
        btn.disabled = false;
        btn.textContent = 'Tekrar dene';
    });
}

function renderDone(){
    const yes = rsvp.status === 'Katilacak';
    document.getElementById('invite').innerHTML = headerHTML() +
        '<div class="inv-hr"></div>' +
        '<div class="done-icon">'+(yes?'🤍':'🌷')+'</div>' +
        '<div class="done-title">'+(yes?'Sizi aramızda görmek için sabırsızlanıyoruz!':'Yanıtınız iletildi')+'</div>' +
        '<div class="done-text">'+
            (yes ? esc(rsvp.partySize||1)+' kişilik katılımınız kaydedildi. Teşekkür ederiz!' :
                   'Aramızda olamayacağınıza üzüldük, anlayışla karşılıyoruz. Sevginiz bizimle 🤍') +
        '</div>' +
        '<button class="change-btn" onclick="renderForm()">Yanıtımı değiştir</button>';
}

if(!wid || !token){
    showError();
} else {
    docRef = db.doc('weddings/'+wid+'/rsvp/'+token);
    docRef.get().then(snap=>{
        if(!snap.exists){ showError(); return; }
        rsvp = snap.data();
        if(rsvp.respondedAt) renderDone();
        else renderForm();
    }).catch(e=>{
        console.error(e);
        showError();
    });
}
</script>
</body>
</html>
