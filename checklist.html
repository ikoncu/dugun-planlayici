<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist - Dugun Planlayici</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --gold:#b8860b;--gold-light:#daa520;--gold-bg:#fdf8ef;
            --green:#059669;--green-bg:#ecfdf5;--green-light:#34d399;
            --red:#dc2626;--red-bg:#fef2f2;
            --blue:#2563eb;--blue-bg:#eff6ff;
            --orange:#ea580c;--orange-bg:#fff7ed;
            --purple:#8b5cf6;--purple-bg:#f5f3ff;
            --cyan:#0891b2;--cyan-bg:#ecfeff;
            --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
            --gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;
            --gray-600:#4b5563;--gray-700:#374151;--gray-900:#111827;--white:#fff;
        }
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}

        /* LOGIN */
        #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
        .login-card{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:40px 32px;text-align:center;max-width:340px;width:100%;margin:16px}
        .login-card .logo{font-size:48px;margin-bottom:16px}
        .login-card h1{color:white;font-size:24px;font-weight:700;margin-bottom:6px}
        .login-card p{color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:32px}
        .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:white;border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:500;cursor:pointer;width:100%;color:#333;box-shadow:0 2px 8px rgba(0,0,0,0.15);transition:transform 0.15s,box-shadow 0.15s}
        .google-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.2)}
        .google-btn svg{width:20px;height:20px;flex-shrink:0}

        /* LOADING */
        #loading-screen{display:none;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;background:var(--gray-50)}
        .spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* APP */
        #app{display:none}

        /* HEADER */
        .header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
        .header-row{display:flex;align-items:center;gap:12px}
        .back-btn{background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:4px;opacity:0.8;text-decoration:none}
        .back-btn:hover{opacity:1}
        .header-row h1{font-size:18px;font-weight:700;flex:1}
        .user-avatar{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);object-fit:cover;cursor:pointer}

        /* PROGRESS */
        .progress-section{padding:16px;max-width:640px;margin:0 auto}
        .progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .progress-label{font-size:13px;font-weight:600;color:var(--gray-700)}
        .progress-count{font-size:13px;font-weight:700;color:var(--gold)}
        .progress-bar{width:100%;height:8px;background:var(--gray-200);border-radius:4px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:4px;transition:width 0.5s ease}

        /* FILTERS */
        .filter-section{padding:0 16px 8px;max-width:640px;margin:0 auto}
        .filter-row{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
        .filter-row::-webkit-scrollbar{display:none}
        .filter-label{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;margin-bottom:6px;letter-spacing:0.3px}
        .chip{padding:6px 14px;border-radius:20px;border:1px solid var(--gray-200);background:white;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--gray-600);transition:all 0.2s}
        .chip.active{background:var(--gold);color:white;border-color:var(--gold)}
        .chip-ibrahim.active{background:#2563eb;border-color:#2563eb}
        .chip-hilal.active{background:#ec4899;border-color:#ec4899}
        .chip-birlikte.active{background:var(--purple);border-color:var(--purple)}

        /* STATUS FILTER */
        .status-chips{display:flex;gap:8px;margin-top:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
        .status-chips::-webkit-scrollbar{display:none}
        .schip{padding:5px 12px;border-radius:20px;border:1px solid var(--gray-200);background:white;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--gray-600);transition:all 0.2s}
        .schip.active{background:var(--gray-900);color:white;border-color:var(--gray-900)}

        /* TASK LIST */
        .task-list{max-width:640px;margin:0 auto;padding:8px 16px 100px;display:flex;flex-direction:column;gap:10px}
        .task-card{background:white;border-radius:14px;border:1px solid var(--gray-100);box-shadow:0 1px 4px rgba(0,0,0,0.06);overflow:hidden;transition:border-color 0.2s}
        .task-card.done{opacity:0.55}
        .tc-main{padding:14px;display:flex;flex-direction:column;gap:8px;cursor:pointer}
        .tc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
        .tc-title{font-size:15px;font-weight:600;flex:1;line-height:1.35}
        .task-card.done .tc-title{text-decoration:line-through;color:var(--gray-400)}
        .tc-status{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;border:none;transition:all 0.2s;flex-shrink:0}
        .tc-status:active{transform:scale(0.95)}
        .tc-status.yapilacak{background:var(--gray-100);color:var(--gray-600)}
        .tc-status.devam{background:var(--orange-bg);color:var(--orange)}
        .tc-status.tamamlandi{background:var(--green-bg);color:var(--green)}
        .tc-tags{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
        .tc-tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:6px}
        .tc-tag.cat{background:var(--gray-100);color:var(--gray-600)}
        .tc-tag.assignee-ibrahim{background:var(--blue-bg);color:var(--blue)}
        .tc-tag.assignee-hilal{background:#fce7f3;color:#be185d}
        .tc-tag.assignee-birlikte{background:var(--purple-bg);color:var(--purple)}
        .tc-due{font-size:11px;color:var(--gray-400);display:flex;align-items:center;gap:4px}
        .tc-due.overdue{color:var(--red);font-weight:600}
        .tc-note{font-size:12px;color:var(--gray-500);line-height:1.4}
        .tc-actions{display:flex;gap:8px;padding:8px 14px;border-top:1px solid var(--gray-100);display:none}
        .task-card.expanded .tc-actions{display:flex}
        .tc-actions button{font-size:12px;padding:6px 12px;border-radius:7px;border:1px solid var(--gray-200);background:white;cursor:pointer;font-weight:500;color:var(--gray-700)}
        .tc-actions .del{color:var(--red);border-color:var(--red-bg)}

        /* FAB */
        .fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--gold);color:white;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(184,134,11,0.4);display:flex;align-items:center;justify-content:center;z-index:50;transition:transform 0.2s}
        .fab:hover{transform:scale(1.08)}

        /* MODAL */
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
        .modal-overlay.open{display:flex}
        .modal{background:white;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px 16px 32px;animation:slideUp 0.3s ease}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .modal h2{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
        .modal h2 button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-400)}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--gray-200);border-radius:10px;font-size:14px;font-family:inherit;background:white}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold)}
        .form-group textarea{resize:vertical;min-height:60px}
        .form-row{display:flex;gap:10px}
        .form-row .form-group{flex:1}
        .modal-save{width:100%;padding:13px;border-radius:12px;border:none;background:var(--gold);color:white;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
        .modal-save:hover{background:var(--gold-light)}

        .empty-state{text-align:center;padding:60px 20px;color:var(--gray-400)}
        .empty-state .icon{font-size:48px;margin-bottom:12px}
        .empty-state p{font-size:14px}
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-card">
        <div class="logo">&#10003;</div>
        <h1>Checklist</h1>
        <p>Dugun organizasyonunu takip edin</p>
        <button class="google-btn" onclick="googleSignIn()">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google ile Giris Yap
        </button>
    </div>
</div>

<!-- LOADING -->
<div id="loading-screen">
    <div class="spinner"></div>
    <div style="font-size:14px;color:var(--gray-500)">Yukleniyor...</div>
</div>

<!-- APP -->
<div id="app">
    <div class="header">
        <div class="header-row">
            <a href="index.html" class="back-btn">&#8592;</a>
            <h1>Checklist</h1>
            <img id="user-avatar" class="user-avatar" src="" alt="" style="display:none">
        </div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-section">
        <div class="progress-info">
            <span class="progress-label">Ilerleme</span>
            <span class="progress-count" id="progressText">0 / 0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
    </div>

    <!-- FILTERS -->
    <div class="filter-section">
        <div class="filter-label">Kisi</div>
        <div class="filter-row" id="assigneeFilters">
            <div class="chip active" data-assignee="Hepsi">Hepsi</div>
            <div class="chip chip-ibrahim" data-assignee="Ibrahim">Ibrahim</div>
            <div class="chip chip-hilal" data-assignee="Hilal">Hilal</div>
            <div class="chip chip-birlikte" data-assignee="Birlikte">Birlikte</div>
        </div>
        <div class="filter-label" style="margin-top:8px">Durum</div>
        <div class="status-chips" id="statusFilters">
            <div class="schip active" data-status="Hepsi">Hepsi</div>
            <div class="schip" data-status="Yapilacak">Yapilacak</div>
            <div class="schip" data-status="Devam Ediyor">Devam Ediyor</div>
            <div class="schip" data-status="Tamamlandi">Tamamlandi</div>
        </div>
    </div>

    <div class="task-list" id="taskList"></div>

    <button class="fab" onclick="openModal()">+</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2>
            <span id="modalTitle">Gorev Ekle</span>
            <button onclick="closeModal()">&times;</button>
        </h2>
        <div class="form-group">
            <label>Gorev</label>
            <input type="text" id="f-title" placeholder="Ornek: Fotografci ile gorusme">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Kategori</label>
                <select id="f-category">
                    <option value="Mekan">Mekan</option>
                    <option value="Nikah">Nikah</option>
                    <option value="Kiyafet">Kiyafet</option>
                    <option value="Organizasyon">Organizasyon</option>
                    <option value="Diger">Diger</option>
                </select>
            </div>
            <div class="form-group">
                <label>Sorumluluk</label>
                <select id="f-assignee">
                    <option value="Ibrahim">Ibrahim</option>
                    <option value="Hilal">Hilal</option>
                    <option value="Birlikte">Birlikte</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Tarih</label>
                <input type="date" id="f-due">
            </div>
            <div class="form-group">
                <label>Durum</label>
                <select id="f-status">
                    <option value="Yapilacak">Yapilacak</option>
                    <option value="Devam Ediyor">Devam Ediyor</option>
                    <option value="Tamamlandi">Tamamlandi</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Not</label>
            <textarea id="f-note" placeholder="Ek bilgiler..."></textarea>
        </div>
        <button class="modal-save" onclick="saveTask()">Kaydet</button>
    </div>
</div>

<script>
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyBwXGAb_p-Hx7D1qmxBBu7viFL1PAQ0m_0",
    authDomain: "dugun-planlayici-ff34e.firebaseapp.com",
    projectId: "dugun-planlayici-ff34e",
    storageBucket: "dugun-planlayici-ff34e.firebasestorage.app",
    messagingSenderId: "740092604485",
    appId: "1:740092604485:web:62b9e0e8b9c45a1581b32c"
};

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();
const docRef = db.collection('shared').doc('checklist');

let checklistData = { list: [] };
let editingId = null;
let filterAssignee = 'Hepsi';
let filterStatus = 'Hepsi';
let unsubscribe = null;

function googleSignIn() {
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';
        const av = document.getElementById('user-avatar');
        if (user.photoURL) { av.src = user.photoURL; av.style.display = 'block'; }
        startListener();
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('app').style.display = 'none';
        if (unsubscribe) unsubscribe();
    }
});

function startListener() {
    unsubscribe = docRef.onSnapshot(snap => {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        if (snap.exists) {
            checklistData.list = snap.data().list || [];
        } else {
            checklistData.list = [];
        }
        render();
    });
}

function save() {
    docRef.set({
        list: checklistData.list,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
}

function formatDate(d) {
    if (!d) return '';
    const parts = d.split('-');
    if (parts.length !== 3) return d;
    return parts[2] + '.' + parts[1] + '.' + parts[0];
}

function isOverdue(d) {
    if (!d) return false;
    const today = new Date();
    today.setHours(0,0,0,0);
    return new Date(d) < today;
}

function statusClassStr(s) {
    if (s === 'Yapilacak') return 'yapilacak';
    if (s === 'Devam Ediyor') return 'devam';
    return 'tamamlandi';
}

function assigneeClass(a) {
    if (a === 'Ibrahim') return 'assignee-ibrahim';
    if (a === 'Hilal') return 'assignee-hilal';
    return 'assignee-birlikte';
}

function render() {
    // Progress
    const total = checklistData.list.length;
    const done = checklistData.list.filter(t => t.status === 'Tamamlandi').length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progressText').textContent = done + ' / ' + total;
    document.getElementById('progressFill').style.width = pct + '%';

    // Filter
    let filtered = checklistData.list;
    if (filterAssignee !== 'Hepsi') filtered = filtered.filter(t => t.assignee === filterAssignee);
    if (filterStatus !== 'Hepsi') filtered = filtered.filter(t => t.status === filterStatus);

    // Sort by due date (empty dates last)
    filtered.sort((a, b) => {
        if (!a.due && !b.due) return 0;
        if (!a.due) return 1;
        if (!b.due) return -1;
        return a.due.localeCompare(b.due);
    });

    const list = document.getElementById('taskList');
    if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="icon">&#10003;</div><p>Henuz gorev eklenmedi</p></div>';
        return;
    }

    list.innerHTML = filtered.map(task => {
        const isDone = task.status === 'Tamamlandi';
        const overdue = !isDone && isOverdue(task.due);
        return `
        <div class="task-card${isDone ? ' done' : ''}" id="tc-${task.id}">
            <div class="tc-main" onclick="toggleCard('${task.id}')">
                <div class="tc-top">
                    <div class="tc-title">${task.title}</div>
                    <button class="tc-status ${statusClassStr(task.status)}" onclick="event.stopPropagation();cycleStatus('${task.id}')">${task.status}</button>
                </div>
                <div class="tc-tags">
                    <span class="tc-tag cat">${task.category}</span>
                    <span class="tc-tag ${assigneeClass(task.assignee)}">${task.assignee}</span>
                    ${task.due ? `<span class="tc-due${overdue ? ' overdue' : ''}">&#128197; ${formatDate(task.due)}</span>` : ''}
                </div>
                ${task.note ? `<div class="tc-note">${task.note}</div>` : ''}
            </div>
            <div class="tc-actions">
                <button onclick="editTask('${task.id}')">Duzenle</button>
                <button class="del" onclick="deleteTask('${task.id}')">Sil</button>
            </div>
        </div>`;
    }).join('');
}

function toggleCard(id) {
    document.getElementById('tc-' + id).classList.toggle('expanded');
}

function cycleStatus(id) {
    const task = checklistData.list.find(t => t.id === id);
    if (!task) return;
    const cycle = ['Yapilacak', 'Devam Ediyor', 'Tamamlandi'];
    const idx = cycle.indexOf(task.status);
    task.status = cycle[(idx + 1) % cycle.length];
    save();
}

// ASSIGNEE FILTERS
document.getElementById('assigneeFilters').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#assigneeFilters .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    filterAssignee = chip.dataset.assignee;
    render();
});

// STATUS FILTERS
document.getElementById('statusFilters').addEventListener('click', e => {
    const chip = e.target.closest('.schip');
    if (!chip) return;
    document.querySelectorAll('#statusFilters .schip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    filterStatus = chip.dataset.status;
    render();
});

// MODAL
function openModal(id) {
    editingId = id || null;
    document.getElementById('modalTitle').textContent = id ? 'Gorevi Duzenle' : 'Gorev Ekle';
    if (id) {
        const task = checklistData.list.find(t => t.id === id);
        if (task) {
            document.getElementById('f-title').value = task.title || '';
            document.getElementById('f-category').value = task.category || 'Diger';
            document.getElementById('f-assignee').value = task.assignee || 'Birlikte';
            document.getElementById('f-due').value = task.due || '';
            document.getElementById('f-status').value = task.status || 'Yapilacak';
            document.getElementById('f-note').value = task.note || '';
        }
    } else {
        document.getElementById('f-title').value = '';
        document.getElementById('f-category').value = 'Organizasyon';
        document.getElementById('f-assignee').value = 'Birlikte';
        document.getElementById('f-due').value = '';
        document.getElementById('f-status').value = 'Yapilacak';
        document.getElementById('f-note').value = '';
    }
    document.getElementById('modal').classList.add('open');
}

function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingId = null;
}

function saveTask() {
    const title = document.getElementById('f-title').value.trim();
    const category = document.getElementById('f-category').value;
    const assignee = document.getElementById('f-assignee').value;
    const due = document.getElementById('f-due').value;
    const status = document.getElementById('f-status').value;
    const note = document.getElementById('f-note').value.trim();

    if (!title) { alert('Gorev adini girin'); return; }

    if (editingId) {
        const idx = checklistData.list.findIndex(t => t.id === editingId);
        if (idx > -1) {
            checklistData.list[idx] = { ...checklistData.list[idx], title, category, assignee, due, status, note };
        }
    } else {
        checklistData.list.push({
            id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
            title, category, assignee, due, status, note
        });
    }
    save();
    closeModal();
}

function editTask(id) {
    openModal(id);
}

function deleteTask(id) {
    if (!confirm('Bu gorevi silmek istediginize emin misiniz?')) return;
    checklistData.list = checklistData.list.filter(t => t.id !== id);
    save();
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
});
</script>
</body>
