<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gorevler - Dugun Planlayici</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --gold:#b8860b;--gold-light:#daa520;--gold-bg:#fdf8ef;
            --green:#059669;--green-bg:#ecfdf5;
            --red:#dc2626;--red-bg:#fef2f2;
            --blue:#2563eb;--blue-bg:#eff6ff;
            --purple:#7c3aed;--purple-bg:#f5f3ff;
            --orange:#ea580c;--orange-bg:#fff7ed;
            --cyan:#0891b2;--cyan-bg:#ecfeff;
            --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
            --g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g900:#111827;
        }
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--g50);color:var(--g900);min-height:100vh;-webkit-tap-highlight-color:transparent}

        /* LOGIN */
        #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
        .login-card{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:40px 32px;text-align:center;max-width:340px;width:100%;margin:16px}
        .login-card h1{color:white;font-size:22px;font-weight:700;margin-bottom:6px}
        .login-card p{color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:24px}
        .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:white;border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:500;cursor:pointer;width:100%;color:#333;box-shadow:0 2px 8px rgba(0,0,0,0.15);transition:transform 0.15s}
        .google-btn:hover{transform:translateY(-1px)}
        .google-btn svg{width:20px;height:20px;flex-shrink:0}

        /* LOADING */
        #loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;background:var(--g50)}
        .spinner{width:36px;height:36px;border:3px solid var(--g200);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* HEADER */
        .header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;padding:10px 16px;position:sticky;top:0;z-index:100}
        .header-row{display:flex;align-items:center;justify-content:space-between}
        .header h1{font-size:16px;font-weight:600;flex:1;text-align:center}
        .user-avatar{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);object-fit:cover;cursor:pointer}
        .user-avatar-fallback{width:32px;height:32px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0}
        .user-dropdown{position:absolute;top:40px;left:0;background:white;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);min-width:160px;z-index:200;overflow:hidden;display:none}
        .user-dropdown.open{display:block}
        .user-dropdown-name{padding:12px 14px;font-size:13px;font-weight:600;color:#111;border-bottom:1px solid #f3f4f6}
        .user-dropdown button.dd-btn{width:100%;padding:10px 14px;text-align:left;border:none;background:none;font-size:13px;cursor:pointer;color:#dc2626}
        .hamburger{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:4px 8px;opacity:0.8}

        /* DRAWER */
        .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300}
        .drawer-overlay.open{display:block}
        .drawer{position:fixed;top:0;right:-280px;width:280px;height:100%;background:white;z-index:301;transition:right 0.25s ease;box-shadow:-4px 0 20px rgba(0,0,0,0.15);overflow-y:auto}
        .drawer.open{right:0}
        .drawer-header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;padding:20px 16px;font-size:16px;font-weight:700}
        .drawer-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #f3f4f6;text-decoration:none;color:#111;font-size:14px;font-weight:500}
        .drawer-item:active{background:#f9fafb}
        .drawer-item .di-icon{font-size:20px;width:28px;text-align:center}
        .drawer-section{padding:8px 16px 4px;font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.5px}
        .drawer-item.active{background:#fdf8ef;color:var(--gold);font-weight:600}

        /* PROGRESS */
        .progress-section{padding:12px 16px 4px;max-width:640px;margin:0 auto}
        .progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .progress-label{font-size:13px;font-weight:600;color:var(--g700)}
        .progress-count{font-size:13px;font-weight:700;color:var(--gold)}
        .progress-bar{width:100%;height:8px;background:var(--g200);border-radius:4px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:4px;transition:width 0.5s ease}

        /* FILTER STRIPS */
        .filter-strip{display:flex;overflow-x:auto;gap:6px;padding:10px 16px;background:white;border-bottom:1px solid var(--g100);-webkit-overflow-scrolling:touch;position:sticky;top:42px;z-index:90}
        .filter-strip::-webkit-scrollbar{display:none}
        .filter-btn{padding:6px 12px;border-radius:16px;font-size:12px;font-weight:500;border:1.5px solid var(--g200);background:white;cursor:pointer;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px}
        .filter-btn.active{border-color:var(--gold);background:var(--gold-bg);color:var(--gold);font-weight:600}
        .filter-btn .cnt{font-size:10px;background:var(--g200);color:var(--g600);border-radius:8px;padding:0 5px;font-weight:600;min-width:16px;text-align:center}
        .filter-btn.active .cnt{background:var(--gold);color:white}

        /* ASSIGNEE FILTER */
        .assignee-strip{display:flex;overflow-x:auto;gap:6px;padding:6px 16px 10px;background:white;border-bottom:1px solid var(--g100);-webkit-overflow-scrolling:touch;position:sticky;top:82px;z-index:89}
        .assignee-strip::-webkit-scrollbar{display:none}
        .asg-btn{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:500;border:1.5px solid var(--g200);background:white;cursor:pointer;white-space:nowrap;flex-shrink:0;color:var(--g600)}
        .asg-btn.active{font-weight:600;color:white}
        .asg-btn.active[data-a="Hepsi"]{border-color:var(--gold);background:var(--gold);color:white}
        .asg-btn.active[data-a="Ibrahim"]{border-color:var(--blue);background:var(--blue);color:white}
        .asg-btn.active[data-a="Hilal"]{border-color:var(--purple);background:var(--purple);color:white}
        .asg-btn.active[data-a="Birlikte"]{border-color:var(--gold);background:var(--gold-bg);color:var(--gold)}

        /* QUICK INPUT */
        .quick-bar{padding:10px 16px;background:white;border-bottom:1px solid var(--g100);position:sticky;top:122px;z-index:80}
        .quick-row{display:flex;gap:6px;align-items:center}
        .quick-input{flex:1;border:1.5px solid var(--g200);border-radius:10px;padding:9px 12px;font-size:14px;outline:none}
        .quick-input:focus{border-color:var(--gold)}
        .qbtn{width:38px;height:38px;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .qbtn-send{background:var(--gold);color:white;font-size:20px;font-weight:300}
        .qbtn-mic{background:var(--g100);font-size:16px}
        .qbtn-mic.on{background:var(--red);color:white;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        .voice-hint{font-size:11px;color:var(--red);padding:3px 0 0;display:none}
        .voice-hint.show{display:block}

        /* TASK CARDS */
        .tlist{padding:0 12px 120px;max-width:640px;margin:0 auto}
        .tcard{background:white;border-radius:10px;border:1px solid var(--g100);margin-bottom:5px;overflow:hidden}
        .tcard.urgent{border-left:3px solid var(--red)}
        .tcard.done{opacity:0.4}
        .tcard.done .ttitle{text-decoration:line-through}
        .tcard.open{border-color:var(--gold);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
        .tmain{display:flex;align-items:flex-start;gap:8px;padding:10px 10px}
        .tchk{width:20px;height:20px;border-radius:5px;border:2px solid var(--g300);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px}
        .tchk:active{transform:scale(0.9)}
        .tchk.on{background:var(--green);border-color:var(--green)}
        .tchk.on::after{content:'\2713';color:white;font-size:12px;font-weight:700}
        .tbody{flex:1;min-width:0;cursor:pointer}
        .ttitle{font-size:13px;font-weight:500;line-height:1.35}
        .tsub{font-size:11px;color:var(--g500);margin-top:1px}
        .ttags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
        .ttag{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600}
        .ttag-cat{background:var(--g100);color:var(--g600)}
        .ttag-urgent{background:var(--red-bg);color:var(--red)}
        .ttag-due{background:var(--g100);color:var(--g600)}
        .ttag-overdue{background:var(--red-bg);color:var(--red)}
        .ttag-ibrahim{background:var(--blue-bg);color:var(--blue)}
        .ttag-hilal{background:var(--purple-bg);color:var(--purple)}
        .ttag-birlikte{background:var(--gold-bg);color:var(--gold)}
        .tarrow{color:var(--g300);font-size:10px;padding:4px;flex-shrink:0}
        .tcard.open .tarrow{transform:rotate(180deg)}

        .tdetail{display:none;padding:0 10px 10px;border-top:1px solid var(--g100)}
        .tcard.open .tdetail{display:block}
        .tnote{white-space:pre-wrap;font-size:12px;color:var(--g700);padding:8px;line-height:1.5;background:var(--g50);border-radius:6px;margin-top:6px}
        .tbtns{display:flex;gap:6px;margin-top:8px}
        .tbtns button{padding:6px 12px;border-radius:6px;border:none;font-size:11px;cursor:pointer;font-weight:500}
        .tbtn-edit{background:var(--g100);color:var(--g700)}
        .tbtn-del{background:var(--red-bg);color:var(--red)}

        /* MODAL */
        .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-end;justify-content:center}
        .modal-bg.show{display:flex}
        .modal{background:white;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:16px 16px 28px;animation:su 0.2s ease}
        @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .modal-bar{width:32px;height:3px;background:var(--g300);border-radius:2px;margin:0 auto 12px}
        .modal-hdr{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
        .modal-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--g400)}
        .fg{margin-bottom:10px}
        .fg label{display:block;font-size:11px;font-weight:600;color:var(--g500);margin-bottom:3px}
        .fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--g200);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit}
        .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold)}
        .btn-save{width:100%;padding:11px;border:none;border-radius:10px;background:var(--gold);color:white;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}

        /* TEMPLATE ITEMS */
        .tmpl-item{display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px solid var(--g100);cursor:pointer}
        .tmpl-item:active{background:var(--g50)}
        .tmpl-icon{font-size:22px}
        .tmpl-info{flex:1}
        .tmpl-info h4{font-size:13px;font-weight:600}
        .tmpl-info p{font-size:11px;color:var(--g500)}

        /* EMPTY */
        .empty{text-align:center;padding:40px 20px;color:var(--g400);font-size:13px}

        /* BOTTOM NAV */
        .bnav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--g200);display:none;height:56px;z-index:95;box-shadow:0 -2px 12px rgba(0,0,0,0.06)}
        .bnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;font-weight:500;color:var(--g400);text-decoration:none}
        .bnav .active{color:var(--gold)}
        .bnav .bicon{font-size:18px}
    </style>
</head>
<body>

<!-- LOGIN (hidden by default) -->
<div id="login-screen" style="display:none">
    <div class="login-card">
        <h1>Gorevler</h1>
        <p>Dugun organizasyon gorev yonetimi</p>
        <button class="google-btn" onclick="signIn()">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google ile Giris
        </button>
    </div>
</div>

<!-- LOADING (visible by default) -->
<div id="loading-screen" style="display:flex">
    <div class="spinner"></div>
    <div style="font-size:14px;color:var(--g400)">Yukleniyor...</div>
</div>

<!-- APP -->
<div id="app" style="display:none;padding-bottom:60px">
    <!-- HEADER -->
    <div class="header">
        <div class="header-row">
            <div style="position:relative">
                <div id="user-avatar-container" onclick="toggleDropdown()"></div>
                <div class="user-dropdown" id="user-dropdown">
                    <div class="user-dropdown-name" id="user-name"></div>
                    <button class="dd-btn" onclick="signOut()">Cikis Yap</button>
                </div>
            </div>
            <h1>Gorevler</h1>
            <button class="hamburger" onclick="toggleDrawer()">&#9776;</button>
        </div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-section">
        <div class="progress-info">
            <span class="progress-label">Ilerleme</span>
            <span class="progress-count" id="progressText">0 / 0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
    </div>

    <!-- CATEGORY FILTERS -->
    <div class="filter-strip" id="filters"></div>

    <!-- ASSIGNEE FILTERS -->
    <div class="assignee-strip" id="asgFilters">
        <button class="asg-btn active" data-a="Hepsi" onclick="setAssignee('Hepsi')">Hepsi</button>
        <button class="asg-btn" data-a="Ibrahim" onclick="setAssignee('Ibrahim')">Ibrahim</button>
        <button class="asg-btn" data-a="Hilal" onclick="setAssignee('Hilal')">Hilal</button>
        <button class="asg-btn" data-a="Birlikte" onclick="setAssignee('Birlikte')">Birlikte</button>
    </div>

    <!-- QUICK INPUT -->
    <div class="quick-bar">
        <div class="quick-row">
            <input type="text" class="quick-input" id="qi" placeholder="Yeni gorev yaz veya sesle soyle..." onkeydown="if(event.key==='Enter')addQuick()">
            <button class="qbtn qbtn-mic" id="mic" onclick="toggleMic()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <button class="qbtn qbtn-send" onclick="addQuick()">&#8593;</button>
        </div>
        <div class="voice-hint" id="vhint">Dinleniyor...</div>
    </div>

    <!-- TASK LIST -->
    <div class="tlist" id="tlist"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav" id="bnav" style="display:none">

    <a class="active" href="gorevler.html"><span class="bicon">&#9989;</span>Gorevler</a>

</nav>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
    <div class="drawer-header">&#128141; Dugun Planlayici</div>
    <div class="drawer-section">Sayfalar</div>
    <a class="drawer-item" href="index.html"><span class="di-icon">&#127968;</span>Ana Sayfa</a>
    <a class="drawer-item active" href="gorevler.html"><span class="di-icon">&#9989;</span>Gorevler</a>
    <a class="drawer-item" href="mekanlar.html"><span class="di-icon">&#127963;&#65039;</span>Mekanlar</a>
    <a class="drawer-item" href="davetliler.html"><span class="di-icon">&#128101;</span>Davetliler</a>
    <div class="drawer-section">Diger</div>
    <a class="drawer-item" href="butce.html"><span class="di-icon">&#128176;</span>Butce</a>
    <a class="drawer-item" href="masa-plani.html"><span class="di-icon">&#129681;</span>Masa Plani</a>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="modal-edit" onclick="if(event.target===this)closeModal('modal-edit')">
    <div class="modal">
        <div class="modal-bar"></div>
        <div class="modal-hdr"><span id="me-title-label">Gorev</span><button class="modal-x" onclick="closeModal('modal-edit')">&times;</button></div>
        <div class="fg"><label>Baslik</label><input type="text" id="me-title"></div>
        <div class="fg"><label>Detay</label><input type="text" id="me-hint" placeholder="Kisa aciklama"></div>
        <div style="display:flex;gap:8px">
            <div class="fg" style="flex:1"><label>Kategori</label><select id="me-cat"></select></div>
            <div class="fg" style="flex:1"><label>Sorumluluk</label><select id="me-asg"><option value="Birlikte">Birlikte</option><option value="Ibrahim">Ibrahim</option><option value="Hilal">Hilal</option></select></div>
        </div>
        <div style="display:flex;gap:8px">
            <div class="fg" style="flex:1"><label>Oncelik</label><select id="me-pri"><option value="urgent">Acil</option><option value="normal" selected>Normal</option><option value="low">Dusuk</option></select></div>
            <div class="fg" style="flex:1"><label>Son Tarih</label><input type="date" id="me-due"></div>
        </div>
        <div class="fg"><label>Not</label><textarea id="me-note" rows="3" placeholder="Detayli not..."></textarea></div>
        <div style="display:flex;gap:8px">
            <button class="btn-save" style="flex:1;background:var(--red-bg);color:var(--red)" id="me-del-btn" onclick="delTask()">Sil</button>
            <button class="btn-save" style="flex:2" onclick="saveTask()">Kaydet</button>
        </div>
    </div>
</div>

<!-- TEMPLATE MODAL -->
<div class="modal-bg" id="modal-templates" onclick="if(event.target===this)closeModal('modal-templates')">
    <div class="modal">
        <div class="modal-bar"></div>
        <div class="modal-hdr">Sablon Ekle <button class="modal-x" onclick="closeModal('modal-templates')">&times;</button></div>
        <div id="tmpl-list"></div>
    </div>
</div>

let authInstance, db, currentUser=null, tasks=[], activeCat='all', activeAsg='Hepsi', editId=null, recognition=null, isRec=false, unsub=null;

// FIREBASE
firebase.initializeApp(FIREBASE_CONFIG);

db = firebase.firestore();

function toggleDrawer(){document.getElementById('drawer').classList.toggle('open');document.getElementById('drawer-overlay').classList.toggle('open')}

function renderAvatar(user){

authInstance.onAuthStateChanged(u=>{
    document.getElementById('loading-screen').style.display='none';
    if(u){
        currentUser=u;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('bnav').style.display='flex';
        renderAvatar(u);
        listen();
    } else {
        currentUser=null;
        document.getElementById('login-screen').style.display='flex';
        document.getElementById('app').style.display='none';

function signIn(){authInstance.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert(e.message))}
function signOut(){if(unsub)unsub();authInstance.signOut()}

function listen(){
    unsub=db.collection('shared').doc('planner_tasks').onSnapshot(doc=>{
        if(doc.exists){tasks=doc.data().list||[];}
        else{tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));save();}
        render();
    });
}
function save(){db.collection('shared').doc('planner_tasks').set({list:JSON.parse(JSON.stringify(tasks)),updatedAt:firebase.firestore.FieldValue.serverTimestamp()})}

// RENDER
function render(){
    renderProgress();
    renderFilters();
    renderList();
}

function renderProgress(){
    const total=tasks.length;
    const done=tasks.filter(t=>t.done).length;
    const pct=total>0?Math.round((done/total)*100):0;
    document.getElementById('progressText').textContent=done+' / '+total;
    document.getElementById('progressFill').style.width=pct+'%';
}

function renderFilters(){
    const el=document.getElementById('filters');
    el.innerHTML=CATS.map(c=>{
        const n=c.id==='all'?tasks.filter(t=>!t.done).length:tasks.filter(t=>t.cat===c.id&&!t.done).length;
        return '<button class="filter-btn'+(activeCat===c.id?' active':'')+'" onclick="setCat(\''+c.id+'\')">'+c.name+' <span class="cnt">'+n+'</span></button>';
    }).join('');
}

function setCat(id){activeCat=id;render();}

function setAssignee(a){
    activeAsg=a;
    document.querySelectorAll('.asg-btn').forEach(b=>b.classList.toggle('active',b.dataset.a===a));
    render();
}

function renderList(){
    const el=document.getElementById('tlist');
    let list=activeCat==='all'?[...tasks]:tasks.filter(t=>t.cat===activeCat);
    if(activeAsg!=='Hepsi') list=list.filter(t=>(t.assignee||'Birlikte')===activeAsg);

    // Sort: done last, then urgent first, then nearest due
    list.sort((a,b)=>{
        if(a.done!==b.done) return a.done?1:-1;
        const p={urgent:0,normal:1,low:2};
        if((p[a.priority]??1)!==(p[b.priority]??1)) return (p[a.priority]??1)-(p[b.priority]??1);
        if(a.due&&b.due) return a.due.localeCompare(b.due);
        if(a.due) return -1;
        if(b.due) return 1;
        return 0;
    });

    if(!list.length){el.innerHTML='<div class="empty">Bu filtrede gorev yok.</div>';return;}
    el.innerHTML=list.map(t=>cardHTML(t)).join('');
}

function cardHTML(t){
    const cat=CATS.find(c=>c.id===t.cat);
    const urg=t.priority==='urgent'&&!t.done;
    const due=t.due?fmtDue(t.due):'';
    const over=t.due&&!t.done&&new Date(t.due)<new Date();
    const asg=t.assignee||'Birlikte';
    const asgClass=asg==='Ibrahim'?'ttag-ibrahim':asg==='Hilal'?'ttag-hilal':'ttag-birlikte';
    return '<div class="tcard'+(t.done?' done':'')+(urg?' urgent':'')+'" id="t-'+t.id+'">'
        +'<div class="tmain">'
        +'<div class="tchk'+(t.done?' on':'')+'" onclick="event.stopPropagation();tog(\''+t.id+'\')"></div>'
        +'<div class="tbody" onclick="flip(\''+t.id+'\')">'
        +'<div class="ttitle">'+esc(t.title)+'</div>'
        +(t.hint?'<div class="tsub">'+esc(t.hint)+'</div>':'')
        +'<div class="ttags">'
        +(activeCat==='all'&&cat?'<span class="ttag ttag-cat" style="border-left:2px solid '+cat.color+'">'+cat.name+'</span>':'')
        +(urg?'<span class="ttag ttag-urgent">Acil</span>':'')
        +'<span class="ttag '+asgClass+'">'+asg+'</span>'
        +(due?'<span class="ttag '+(over?'ttag-overdue':'ttag-due')+'">'+due+'</span>':'')
        +'</div>'
        +'</div>'
        +'<span class="tarrow" onclick="flip(\''+t.id+'\')">&#9660;</span>'
        +'</div>'
        +'<div class="tdetail">'
        +(t.note?'<div class="tnote">'+esc(t.note)+'</div>':'')
        +'<div class="tbtns">'
        +'<button class="tbtn-edit" onclick="openEdit(\''+t.id+'\')">Duzenle</button>'
        +'<button class="tbtn-del" onclick="del(\''+t.id+'\')">Sil</button>'
        +'</div>'
        +'</div>'
        +'</div>';
}

function fmtDue(d){
    const dt=new Date(d+'T00:00:00'),now=new Date(),diff=Math.ceil((dt-now)/(864e5));
    const m=['Oca','Sub','Mar','Nis','May','Haz','Tem','Agu','Eyl','Eki','Kas','Ara'];
    const s=dt.getDate()+' '+m[dt.getMonth()];
    if(diff<0) return s+' (gecti!)';
    if(diff===0) return 'Bugun!';
    if(diff===1) return 'Yarin';
    if(diff<=7) return diff+' gun';
    return s;
}

// ACTIONS
function flip(id){document.getElementById('t-'+id)?.classList.toggle('open')}
function tog(id){const t=tasks.find(x=>x.id===id);if(t){t.done=!t.done;save();}}
function del(id){if(confirm('Sil?')){tasks=tasks.filter(t=>t.id!==id);save();}}

function addQuick(){
    const inp=document.getElementById('qi');
    const txt=inp.value.trim();
    if(!txt) return;
    tasks.push({id:'t'+Date.now(),cat:activeCat==='all'?'diger':activeCat,title:txt,hint:'',done:false,priority:'normal',due:'',note:'',assignee:activeAsg==='Hepsi'?'Birlikte':activeAsg});
    inp.value='';
    save();
}

// EDIT MODAL
function openEdit(id){
    const t=id?tasks.find(x=>x.id===id):null;
    editId=id||null;
    document.getElementById('me-title-label').textContent=t?'Gorevi Duzenle':'Yeni Gorev';
    document.getElementById('me-del-btn').style.display=t?'block':'none';
    const catSel=document.getElementById('me-cat');
    catSel.innerHTML=CATS.filter(c=>c.id!=='all').map(c=>'<option value="'+c.id+'">'+c.name+'</option>').join('');
    document.getElementById('me-title').value=t?t.title:'';
    document.getElementById('me-hint').value=t?t.hint||'':'';
    catSel.value=t?t.cat:(activeCat==='all'?'diger':activeCat);
    document.getElementById('me-asg').value=t?(t.assignee||'Birlikte'):'Birlikte';
    document.getElementById('me-pri').value=t?t.priority:'normal';
    document.getElementById('me-due').value=t?t.due||'':'';
    document.getElementById('me-note').value=t?t.note||'':'';
    openModal('modal-edit');
}

function saveTask(){
    const title=document.getElementById('me-title').value.trim();
    if(!title){alert('Baslik gerekli');return;}
    const data={
        cat:document.getElementById('me-cat').value,
        title,
        hint:document.getElementById('me-hint').value.trim(),
        assignee:document.getElementById('me-asg').value,
        priority:document.getElementById('me-pri').value,
        due:document.getElementById('me-due').value,
        note:document.getElementById('me-note').value.trim()
    };
    if(editId){
        const t=tasks.find(x=>x.id===editId);
        if(t) Object.assign(t,data);
    } else {
        tasks.push({...data,id:'t'+Date.now(),done:false});
    }
    save();
    closeModal('modal-edit');
}

function delTask(){
    if(editId&&confirm('Sil?')){tasks=tasks.filter(t=>t.id!==editId);save();closeModal('modal-edit');}
}

// TEMPLATES
function renderTemplates(){
    document.getElementById('tmpl-list').innerHTML=TEMPLATES.map(t=>
        '<div class="tmpl-item" onclick="applyTmpl(\''+t.id+'\')">'
        +'<span class="tmpl-icon">'+t.icon+'</span>'
        +'<div class="tmpl-info"><h4>'+t.name+'</h4><p>'+t.desc+'</p></div>'
        +'</div>'
    ).join('');
}

function applyTmpl(tid){
    const tmpl=TEMPLATES.find(t=>t.id===tid);
    if(!tmpl||!confirm(tmpl.name+' eklensin mi?')) return;
    tmpl.tasks.forEach(t=>{tasks.push({...t,id:'t'+Date.now()+Math.random().toString(36).slice(2,5),done:false,due:''});});
    save();
    closeModal('modal-templates');
}

// MODALS
function openModal(id){
    document.getElementById(id).classList.add('show');
    if(id==='modal-templates') renderTemplates();
}
function closeModal(id){document.getElementById(id).classList.remove('show')}

// VOICE
function toggleMic(){
    if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('Chrome gerekli.');return;}
    if(isRec){stopMic();return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR();
    recognition.lang='tr-TR';
    recognition.continuous=false;
    recognition.interimResults=true;
    recognition.onresult=e=>{
        let txt='';
        for(let i=e.resultIndex;i<e.results.length;i++) txt+=e.results[i][0].transcript;
        document.getElementById('qi').value=txt;
    };
    recognition.onend=()=>{isRec=false;document.getElementById('mic').classList.remove('on');document.getElementById('vhint').classList.remove('show');};
    recognition.onerror=()=>stopMic();
    recognition.start();
    isRec=true;
    document.getElementById('mic').classList.add('on');
    document.getElementById('vhint').classList.add('show');
    document.getElementById('vhint').textContent='Dinleniyor... konusmaya baslayin';
}
function stopMic(){if(recognition)recognition.stop();isRec=false;document.getElementById('mic').classList.remove('on');document.getElementById('vhint').classList.remove('show');}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
