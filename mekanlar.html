<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mekanlar - Dugun Planlayici</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --gold:#b76e79;--gold-light:#d4949e;--gold-bg:#fdf2f4;
            --green:#059669;--green-bg:#ecfdf5;--green-light:#34d399;
            --red:#dc2626;--red-bg:#fef2f2;
            --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
            --gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;
            --gray-700:#374151;--gray-900:#111827;--white:#fff;
        }
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh;-webkit-tap-highlight-color:transparent}

        /* LOGIN */
        #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#2d1b30,#4a2040,#6b2d5b)}
        .login-card{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:40px 32px;text-align:center;max-width:340px;width:100%;margin:16px}
        .login-card .logo{font-size:48px;margin-bottom:16px}
        .login-card h1{color:white;font-size:22px;font-weight:700;margin-bottom:6px}
        .login-card p{color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:24px}
        .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:white;border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:500;cursor:pointer;width:100%;color:#333;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
        .google-btn svg{width:20px;height:20px;flex-shrink:0}

        /* HEADER */
        .header{background:linear-gradient(135deg,#2d1b30,#4a2040);color:white;padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
        .header-row{display:flex;align-items:center;gap:12px}
        .header h1{font-size:17px;font-weight:700;flex:1}
        .hamburger{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:4px 8px;opacity:0.8}
        .hamburger:hover{opacity:1}
        .user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);object-fit:cover;cursor:pointer}
        .user-avatar-fallback{width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;cursor:pointer}
        .user-dropdown{position:absolute;top:40px;left:0;background:white;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);min-width:160px;z-index:200;overflow:hidden;display:none}
        .user-dropdown.open{display:block}
        .user-dropdown-name{padding:12px 14px;font-size:13px;font-weight:600;color:var(--gray-900);border-bottom:1px solid var(--gray-100)}
        .user-dropdown button{width:100%;padding:10px 14px;text-align:left;border:none;background:none;font-size:13px;cursor:pointer;color:var(--red)}
        .user-dropdown button:hover{background:var(--gray-50)}
        .dd-btn{width:100%;padding:10px 14px;text-align:left;border:none;background:none;font-size:13px;cursor:pointer;color:var(--red)}
        .dd-btn:hover{background:var(--gray-50)}

        /* DRAWER */
        .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300}
        .drawer-overlay.open{display:block}
        .drawer{position:fixed;top:0;right:-280px;width:280px;height:100%;background:white;z-index:301;transition:right 0.25s ease;box-shadow:-4px 0 20px rgba(0,0,0,0.15);overflow-y:auto}
        .drawer.open{right:0}
        .drawer-header{background:linear-gradient(135deg,#2d1b30,#4a2040);color:white;padding:20px 16px;font-size:16px;font-weight:700}
        .drawer-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--gray-100);text-decoration:none;color:var(--gray-900);font-size:14px;font-weight:500}
        .drawer-item:active{background:var(--gray-50)}
        .drawer-item.active{color:var(--gold);background:var(--gold-bg)}
        .drawer-item .di-icon{font-size:20px;width:28px;text-align:center}
        .drawer-section{padding:8px 16px 4px;font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.5px}

        /* BOTTOM NAV */
        .bnav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--gray-200);display:flex;height:56px;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,0.06)}
        .bnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;font-weight:500;color:var(--gray-400);text-decoration:none;border:none;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
        .bnav .active{color:var(--gold)}
        .bnav .bicon{font-size:18px}

        /* LOADING */
        #loading-screen{display:none;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;background:var(--gray-50)}
        .spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* APP */
        #app{display:none;padding-bottom:68px}

        /* ADD BUTTON */
        .add-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:white;border-bottom:1px solid var(--gray-100);position:sticky;top:49px;z-index:90}
        .add-bar-title{font-size:14px;color:var(--gray-500);font-weight:500}
        .btn-add{padding:7px 14px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:var(--gold);color:white;display:flex;align-items:center;gap:4px}
        .btn-add:active{opacity:0.85}

        /* VENUE CARDS */
        .venue-grid{padding:12px 16px;display:flex;flex-direction:column;gap:12px;max-width:640px;margin:0 auto;padding-bottom:80px}
        .venue-card{background:white;border-radius:14px;border:1px solid var(--gray-100);box-shadow:0 1px 4px rgba(0,0,0,0.06);overflow:hidden;position:relative}
        .venue-card.fav{border-color:var(--gold);border-width:2px}
        .vc-top{padding:14px 14px 10px}
        .vc-name{font-size:16px;font-weight:600;padding-right:32px;margin-bottom:6px}
        .vc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
        .vc-tag{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--gray-100);color:var(--gray-700);font-weight:500}
        .vc-fav{position:absolute;top:12px;right:12px;background:none;border:none;font-size:22px;cursor:pointer}
        .vc-expand-btn{width:100%;background:none;border:none;border-top:1px solid var(--gray-100);padding:8px;font-size:12px;color:var(--gray-500);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
        .vc-expand-arrow{transition:transform 0.2s}
        .venue-card.expanded .vc-expand-arrow{transform:rotate(180deg)}
        .vc-detail{display:none;padding:12px 14px;border-top:1px solid var(--gray-100);background:var(--gray-50)}
        .venue-card.expanded .vc-detail{display:block}
        .vc-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--gray-100);font-size:13px}
        .vc-row span{color:var(--gray-500)}
        .vc-row input{border:none;background:transparent;text-align:right;font-size:13px;font-family:inherit;width:150px}
        .vc-row input:focus{outline:none;background:white;border-radius:4px;padding:2px 4px}
        .vc-note{width:100%;border:1px solid var(--gray-200);border-radius:8px;padding:8px;font-size:13px;resize:none;height:55px;font-family:inherit;margin-top:8px;background:white}
        .vc-note:focus{outline:none;border-color:var(--gold)}
        .vc-actions{display:flex;gap:8px;margin-top:10px}
        .vc-actions a,.vc-actions button{font-size:12px;padding:6px 12px;border-radius:7px;border:1px solid var(--gray-200);background:white;text-decoration:none;color:var(--gray-700);cursor:pointer;font-weight:500}
        .vc-actions a.ig{background:linear-gradient(135deg,#833AB4,#FD1D1D);color:white;border:none}
        .vc-actions .del{color:var(--red);border-color:var(--red-bg)}
        .vc-actions .del:active{background:var(--red-bg)}

        /* EMPTY STATE */
        .empty-state{text-align:center;padding:60px 20px;color:var(--gray-400)}
        .empty-state .icon{font-size:48px;margin-bottom:12px}
        .empty-state p{font-size:14px}

        /* MODAL */
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center;padding:16px}
        .modal-overlay.open{display:flex}
        .modal{background:white;border-radius:16px;padding:24px 20px;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,0.2)}
        .modal h2{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--gray-900)}
        .modal-field{margin-bottom:12px}
        .modal-field label{display:block;font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:4px}
        .modal-field input{width:100%;border:1.5px solid var(--gray-200);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none}
        .modal-field input:focus{border-color:var(--gold)}
        .modal-btns{display:flex;gap:8px;margin-top:18px}
        .modal-btns button{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none}
        .btn-cancel{background:var(--gray-100);color:var(--gray-700)}
        .btn-save{background:var(--gold);color:white}
        .btn-save:active{opacity:0.85}

        /* TOAST */
        .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--gray-900);color:white;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;z-index:600;pointer-events:none}
        .toast.show{opacity:1}
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="display:none">
    <div class="login-card">
        <div class="logo">💍</div>
        <h1>Mekanlar</h1>
        <p>Dugun mekanlarini kesfet ve karsilastir</p>
        <button class="google-btn" onclick="signIn()">
            <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.998 23.998 0 0 0 0 24c0 3.77.9 7.35 2.56 10.52l7.97-5.93z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.93C6.51 42.62 14.62 48 24 48z"/></svg>

</div>

<!-- LOADING -->
<div id="loading-screen" style="display:flex">

</div>

<!-- APP -->
<div id="app">
    <!-- HEADER -->
    <div class="header">
        <div class="header-row">
            <div style="position:relative">
                <div id="user-avatar-container" onclick="toggleDropdown()"></div>

        <div class="modal-btns">

<!-- TOAST -->

<script>
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyBwXGAb_p-Hx7D1qmxBBu7viFL1PAQ0m_0",
    authDomain: "dugun-planlayici-ff34e.firebaseapp.com",
    projectId: "dugun-planlayici-ff34e",
    storageBucket: "dugun-planlayici-ff34e.firebasestorage.app",
    messagingSenderId: "740092604485",
    appId: "1:740092604485:web:62b9e0e8b9c45a1581b32c"
};

const DEFAULT_VENUES = [
    {id:'v1',name:'Selale Plaza Dugun Salonu',instagram:'https://www.instagram.com/selaleplazadugunsalonu/',features:['Salon'],notes:'',favorite:false,price:'',capacity:'',contact:''},
    {id:'v2',name:'Pembe Kosk Balo Salon',instagram:'https://www.instagram.com/pembekoskbalosalon/',features:['Balo Salonu'],notes:'',favorite:false,price:'',capacity:'',contact:''},
    {id:'v3',name:'Marina Gaziantep BKM',instagram:'https://www.instagram.com/marinagaziantepbkm/',features:['Salon'],notes:'',favorite:false,price:'',capacity:'',contact:''},
    {id:'v4',name:'Vadi Garden Gaziantep',instagram:'https://www.instagram.com/vadigardengaziantep/',features:['Bahce','Acik Hava'],notes:'',favorite:false,price:'',capacity:'',contact:''},
    {id:'v5',name:'Livas Park Dugun',instagram:'https://www.instagram.com/livasparkdugun/',features:['Park','Acik Hava'],notes:'',favorite:false,price:'',capacity:'',contact:''},
    {id:'v6',name:'Ceremony Erikce',instagram:'https://www.instagram.com/ceremonyerikce/',features:['Salon'],notes:'',favorite:false,price:'',capacity:'',contact:''},
    {id:'v7',name:'MSM Erikce',instagram:'https://www.instagram.com/msmerikce/',features:['Salon'],notes:'',favorite:false,price:'',capacity:'',contact:''}
];

// Firebase init
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();
const venueRef = db.collection('shared').doc('venues');

let currentUser = null;
let venues = [];
let expandedId = null;
let unsubscribe = null;

// Auth
function signIn(){
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert(e.message));
}
function signOut(){
    auth.signOut();
}
function toggleDropdown(){
    document.getElementById('user-dropdown').classList.toggle('open');
}
document.addEventListener('click', e=>{
    const dd = document.getElementById('user-dropdown');
    if(dd && !e.target.closest('#user-avatar-container') && !e.target.closest('#user-dropdown')) dd.classList.remove('open');
});

function renderAvatar(u){
    const c = document.getElementById('user-avatar-container');
    if(u.photoURL){
        c.innerHTML = '<img class="user-avatar" src="'+u.photoURL+'" referrerpolicy="no-referrer">';
    } else {
        c.innerHTML = '<div class="user-avatar-fallback">'+(u.displayName||u.email||'?').charAt(0).toUpperCase()+'</div>';
    }
    document.getElementById('user-name').textContent = u.displayName||u.email||'';
}

auth.onAuthStateChanged(u=>{
    if(u){
        currentUser = u;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('loading-screen').style.display='flex';
        renderAvatar(u);
        listen();
    } else {
        currentUser = null;
        if(unsubscribe) unsubscribe();
        document.getElementById('login-screen').style.display='flex';
        document.getElementById('app').style.display='none';
        document.getElementById('bnav').style.display='none';
        document.getElementById('loading-screen').style.display='none';
    }
});

// Firestore listen
function listen(){
    unsubscribe = venueRef.onSnapshot(snap=>{
        document.getElementById('loading-screen').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('bnav').style.display='flex';
        if(snap.exists && snap.data().list && snap.data().list.length > 0){
            venues = snap.data().list;
        } else {
            venues = JSON.parse(JSON.stringify(DEFAULT_VENUES));
            saveVenues();
        }
        renderVenues();
    }, err=>{
        console.error(err);
        document.getElementById('loading-screen').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('bnav').style.display='flex';
    });
}

function saveVenues(){
    venueRef.set({list: venues}).catch(e=>console.error('Save error:',e));
}

function sortedVenues(){
    return [...venues].sort((a,b)=>{
        if(a.favorite && !b.favorite) return -1;
        if(!a.favorite && b.favorite) return 1;
        return a.name.localeCompare(b.name,'tr');
    });
}

function esc(s){
    const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;
}

function renderVenues(){
    const sorted = sortedVenues();
    const grid = document.getElementById('venue-grid');
    document.getElementById('venue-count').textContent = sorted.length + ' mekan';

    if(sorted.length === 0){
        grid.innerHTML = '<div class="empty-state"><div class="icon">&#127963;&#65039;</div><p>Henuz mekan eklenmemis.<br>Yeni mekan ekleyerek baslayabilirsiniz.</p></div>';
        return;
    }

    let html = '';
    sorted.forEach(v=>{
        const isExpanded = expandedId === v.id;
        const favClass = v.favorite ? ' fav' : '';
        const expClass = isExpanded ? ' expanded' : '';

        html += '<div class="venue-card'+favClass+expClass+'" data-id="'+v.id+'">';
        html += '<div class="vc-top">';
        html += '<div class="vc-name">'+esc(v.name)+'</div>';
        html += '<button class="vc-fav" onclick="toggleFav(\''+v.id+'\')">'+(v.favorite ? '&#11088;' : '&#9734;')+'</button>';

        if(v.features && v.features.length > 0){
            html += '<div class="vc-tags">';
            v.features.forEach(f=>{
                html += '<span class="vc-tag">'+esc(f)+'</span>';
            });
            html += '</div>';
        }

        html += '</div>';

        // Expand button
        html += '<button class="vc-expand-btn" onclick="toggleExpand(\''+v.id+'\')">';
        html += '<span>'+(isExpanded ? 'Detaylari Gizle' : 'Detaylari Gor')+'</span>';
        html += '<span class="vc-expand-arrow">&#9660;</span>';
        html += '</button>';

        // Detail section
        html += '<div class="vc-detail">';
        html += '<div class="vc-row"><span>Fiyat</span><input type="text" value="'+esc(v.price)+'" placeholder="Belirtilmedi" onchange="updVenue(\''+v.id+'\',\'price\',this.value)"></div>';
        html += '<div class="vc-row"><span>Kapasite</span><input type="text" value="'+esc(v.capacity)+'" placeholder="Belirtilmedi" onchange="updVenue(\''+v.id+'\',\'capacity\',this.value)"></div>';
        html += '<div class="vc-row"><span>Iletisim</span><input type="text" value="'+esc(v.contact)+'" placeholder="Belirtilmedi" onchange="updVenue(\''+v.id+'\',\'contact\',this.value)"></div>';
        html += '<textarea class="vc-note" placeholder="Notlar..." onchange="updVenue(\''+v.id+'\',\'notes\',this.value)">'+esc(v.notes)+'</textarea>';

        html += '<div class="vc-actions">';
        if(v.instagram){
            // intent:// ile native Instagram app acilir, fallback olarak web acilir
            const igUser = v.instagram.replace(/https?:\/\/(www\.)?instagram\.com\/?/,'').replace(/\/$/,'');
            const intentUrl = 'intent://instagram.com/'+igUser+'#Intent;package=com.instagram.android;scheme=https;end';
            html += '<a class="ig" href="'+intentUrl+'" onclick="event.preventDefault();window.location.href=\'instagram://user?username='+igUser+'\';setTimeout(()=>{window.open(\''+esc(v.instagram)+'\',\'_blank\')},500)">Instagram</a>';
        }
        html += '<button class="del" onclick="removeVenue(\''+v.id+'\')">Sil</button>';
        html += '</div>';

        html += '</div>'; // vc-detail
        html += '</div>'; // venue-card
    });

    grid.innerHTML = html;
}

function toggleFav(id){
    const v = venues.find(x=>x.id===id);
    if(v){
        v.favorite = !v.favorite;
        saveVenues();
        showToast(v.favorite ? 'Favorilere eklendi' : 'Favorilerden cikarildi');
    }
}

function toggleExpand(id){
    expandedId = expandedId === id ? null : id;
    renderVenues();
}

function updVenue(id, field, val){
    const v = venues.find(x=>x.id===id);
    if(v){
        v[field] = val;
        saveVenues();
    }
}

function removeVenue(id){
    const v = venues.find(x=>x.id===id);
    if(!v) return;
    if(!confirm(v.name + ' silinsin mi?')) return;
    venues = venues.filter(x=>x.id!==id);
    if(expandedId === id) expandedId = null;
    saveVenues();
    showToast('Mekan silindi');
}

function openVenueModal(){
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-ig').value = '';
    document.getElementById('inp-features').value = '';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(()=>document.getElementById('inp-name').focus(), 100);
}

function closeModal(e){
    if(e && e.target !== document.getElementById('modal-overlay')) return;
    document.getElementById('modal-overlay').classList.remove('open');
}

function saveNewVenue(){
    const name = document.getElementById('inp-name').value.trim();
    if(!name){
        alert('Mekan adi zorunludur.');
        return;
    }
    const ig = document.getElementById('inp-ig').value.trim();
    const featuresStr = document.getElementById('inp-features').value.trim();
    const features = featuresStr ? featuresStr.split(',').map(f=>f.trim()).filter(f=>f) : [];

    const newVenue = {
        id: 'v' + Date.now(),
        name: name,
        instagram: ig,
        features: features,
        notes: '',
        favorite: false,
        price: '',
        capacity: '',
        contact: ''
    };

    venues.push(newVenue);
    saveVenues();
    document.getElementById('modal-overlay').classList.remove('open');
    showToast('Mekan eklendi');
}

function toggleDrawer(){
    document.getElementById('drawer').classList.toggle('open');
    document.getElementById('drawer-overlay').classList.toggle('open');
}

function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
