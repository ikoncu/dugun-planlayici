<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Düğün Planlayıcı</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js"></script>
    <script src="./firestore-helpers.js?v=3"></script>
    <link rel="stylesheet" href="shared.css?v=3">
    <script src="./shared-ui.js?v=3"></script>
    <style>
        /* HERO — düğün geri sayımı */
        .hero{text-align:center;padding:34px 20px 28px;background:linear-gradient(175deg,#f7f0e4,var(--gray-50));border-bottom:1px solid var(--gray-100)}
        .hero-names{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:1px;color:var(--gray-900)}
        .hero-names::after{content:'';display:block;width:56px;height:1px;background:var(--gold-light);margin:12px auto}
        .hero-meta{font-size:13px;color:var(--gray-500);letter-spacing:0.4px}
        .hero-meta strong{color:var(--gold);font-weight:600}
        .hero-count{margin-top:18px;display:flex;align-items:baseline;justify-content:center;gap:8px}
        .hero-count .hc-num{font-family:var(--serif);font-size:56px;font-weight:600;color:var(--gold);line-height:1}
        .hero-count .hc-lbl{font-size:14px;color:var(--gray-500)}
        .hero-today{margin-top:6px;font-family:var(--serif);font-size:22px;color:var(--gold);font-style:italic}

        /* DASHBOARD CARDS */
        .dash-cards{padding:16px;display:flex;flex-direction:column;gap:14px;max-width:640px;margin:0 auto;padding-bottom:80px}
        .dash-card{background:white;border-radius:16px;padding:16px;box-shadow:0 1px 6px rgba(45,40,35,0.05);border:1px solid var(--gray-100)}
        .dash-card-title{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--gray-900);letter-spacing:0.3px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
        .dash-card-title a{font-family:var(--sans);font-size:12px;color:var(--gold);text-decoration:none;font-weight:500}

        /* MINI STATS */
        .mini-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
        .mini-stat{text-align:center;padding:10px 4px;border-radius:10px;background:var(--gray-50)}
        .mini-stat .ms-num{font-size:21px;font-weight:800}
        .mini-stat .ms-label{font-size:9px;color:var(--gray-500);margin-top:1px}
        .mini-stat.green .ms-num{color:var(--green)}
        .mini-stat.orange .ms-num{color:var(--orange)}
        .mini-stat.red .ms-num{color:var(--red)}
        .mini-stat.blue .ms-num{color:var(--blue)}
        .rsvp-note{font-size:12px;color:var(--gray-500);margin-top:10px;display:flex;align-items:center;gap:6px}
        .rsvp-note .rn-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}

        /* PROGRESS BAR */
        .progress-wrap{margin-bottom:4px}
        .progress-bar{width:100%;height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:4px;transition:width 0.5s}
        .progress-text{display:flex;justify-content:space-between;font-size:12px;color:var(--gray-500);margin-top:6px}

        /* TASK PREVIEW */
        .task-preview{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--gray-100);cursor:pointer}
        .task-preview:last-child{border-bottom:none}
        .tp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .tp-dot.urgent{background:var(--red)}
        .tp-dot.normal{background:var(--orange)}
        .tp-dot.low{background:var(--gray-300)}
        .tp-info{flex:1;min-width:0}
        .tp-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .tp-meta{font-size:11px;color:var(--gray-400)}
        .tp-tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;flex-shrink:0}
        .tp-tag.assignee{background:var(--blue-bg);color:var(--blue)}

        /* EMPTY STATE */
        .empty-state{text-align:center;padding:12px 0;color:var(--gray-400);font-size:13px}
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen"></div>

<!-- LOADING -->
<div id="loading-screen" style="display:flex"></div>

<!-- APP -->
<div id="app">
    <div class="header">
        <div class="header-row">
            <a href="index.html" class="header-logo">H&amp;İ</a>
            <h1>Ana Sayfa</h1>
            <button class="hamburger" onclick="UI.toggleDrawer()">☰</button>
        </div>
    </div>

    <!-- HERO: geri sayım -->
    <div class="hero" id="hero"></div>

    <div class="dash-cards" id="dash-cards">
        <!-- Davetli & RSVP Özeti -->
        <div class="dash-card">
            <div class="dash-card-title">Davetliler <a href="davetliler.html">Tümü &rarr;</a></div>
            <div class="mini-stats" id="guest-stats">
                <div class="mini-stat blue"><div class="ms-num" id="gs-total">0</div><div class="ms-label">Toplam Kişi</div></div>
                <div class="mini-stat green"><div class="ms-num" id="gs-confirmed">0</div><div class="ms-label">Katılacak</div></div>
                <div class="mini-stat orange"><div class="ms-num" id="gs-pending">0</div><div class="ms-label">Beklemede</div></div>
                <div class="mini-stat red"><div class="ms-num" id="gs-declined">0</div><div class="ms-label">Katılmayacak</div></div>
            </div>
            <div class="rsvp-note" id="rsvp-note" style="display:none"><span class="rn-dot"></span><span id="rsvp-note-text"></span></div>
        </div>

        <!-- Genel İlerleme -->
        <div class="dash-card">
            <div class="dash-card-title">Hazırlık İlerlemesi <a href="gorevler.html">Tümü &rarr;</a></div>
            <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
                <div class="progress-text"><span id="prog-label">0 / 0 görev</span><span id="prog-pct">0%</span></div>
            </div>
        </div>

        <!-- Yaklaşan Görevler -->
        <div class="dash-card">
            <div class="dash-card-title">Yaklaşan Görevler <a href="gorevler.html">Tümü &rarr;</a></div>
            <div id="upcoming-tasks"><div class="empty-state">Görev bulunamadı</div></div>
        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav" id="bnav" style="display:none"></nav>

<script>
// UI inject
UI.injectLogin('Düğün Planlayıcı', 'Düğününüzü birlikte planlayalım');
UI.injectLoading();
UI.injectBnav('index');
UI.injectDrawer('index');

// State
let dashData = { tasks: [], guests: [] };

UI.setupAuth({
    onLogin: function() {
        loadDashboard();
    }
});

function loadDashboard() {
    fh.listen(fh.path('tasks'), (data) => {
        dashData.tasks = (data && data.list) ? data.list : [];
        renderDashboard();
    });

    fh.listen(fh.path('guests'), (data) => {
        dashData.guests = (data && data.list) ? data.list : [];
        renderDashboard();
    });
}

function renderDashboard() {
    UI.showApp();
    renderHero();
    renderProgress();
    renderUpcomingTasks();
    renderGuestSummary();
}

// ── HERO: geri sayım ──
const MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const DAYS = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];

function renderHero() {
    const w = fh.wedding() || {};
    const el = document.getElementById('hero');
    const date = parseLocalDate(w.weddingDate);
    let metaHtml = '';
    if (date) {
        metaHtml = date.getDate() + ' ' + MONTHS[date.getMonth()] + ' ' + date.getFullYear() +
            ', ' + DAYS[date.getDay()] +
            (w.venue ? ' &middot; <strong>' + UI.esc(w.venue) + '</strong>' : '');
    } else if (w.venue) {
        metaHtml = '<strong>' + UI.esc(w.venue) + '</strong>';
    }

    let countHtml = '';
    if (date) {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const days = Math.round((date - today) / 864e5);
        if (days > 0) {
            countHtml = '<div class="hero-count"><span class="hc-num">' + days + '</span><span class="hc-lbl">gün kaldı</span></div>';
        } else if (days === 0) {
            countHtml = '<div class="hero-today">Bugün evleniyorsunuz! 🤍</div>';
        } else {
            countHtml = '<div class="hero-today">Mutluluklar! 🤍</div>';
        }
    }

    el.innerHTML =
        '<div class="hero-names">' + UI.esc(w.coupleNames || 'Düğünümüz') + '</div>' +
        '<div class="hero-meta">' + metaHtml + '</div>' +
        countHtml;
}

function renderProgress() {
    const tasks = dashData.tasks;
    let total = 0, done = 0;
    tasks.forEach(t => {
        if (t.subtasks && t.subtasks.length > 0) {
            total += t.subtasks.length;
            done += t.subtasks.filter(s => s.done).length;
        } else {
            total++;
            if (t.done) done++;
        }
    });
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-label').textContent = done + ' / ' + total + ' görev';
    document.getElementById('prog-pct').textContent = pct + '%';
}

function renderUpcomingTasks() {
    const container = document.getElementById('upcoming-tasks');
    const upcoming = dashData.tasks
        .filter(t => !t.done && t.due)
        .sort((a, b) => new Date(a.due) - new Date(b.due))
        .slice(0, 5);

    if (upcoming.length === 0) {
        container.innerHTML = '<div class="empty-state">Yaklaşan görev yok</div>';
        return;
    }

    container.innerHTML = upcoming.map(t => {
        const pClass = t.priority === 'urgent' ? 'urgent' : (t.priority === 'low' ? 'low' : 'normal');
        const assignee = t.assignee ? '<span class="tp-tag assignee">' + UI.esc(UI.trLabel(t.assignee)) + '</span>' : '';
        return '<div class="task-preview" onclick="location.href=\'gorevler.html\'">' +
            '<div class="tp-dot ' + pClass + '"></div>' +
            '<div class="tp-info">' +
                '<div class="tp-title">' + UI.esc(t.title || t.text || '') + '</div>' +
                '<div class="tp-meta">' + fmtDue(t.due) + '</div>' +
            '</div>' +
            assignee +
        '</div>';
    }).join('');
}

function renderGuestSummary() {
    const guests = dashData.guests;
    let total = 0, confirmed = 0, pending = 0, declined = 0, selfResponded = 0;
    guests.forEach(g => {
        const count = (g.total || 1);
        total += count;
        const s = (g.rsvp || '');
        if (s === 'Katilacak') confirmed += count;
        else if (s === 'Katilmayacak') declined += count;
        else pending += count;
        if (g.rsvpRespondedAt) selfResponded++;
    });
    document.getElementById('gs-total').textContent = total;
    document.getElementById('gs-confirmed').textContent = confirmed;
    document.getElementById('gs-pending').textContent = pending;
    document.getElementById('gs-declined').textContent = declined;

    const note = document.getElementById('rsvp-note');
    if (selfResponded > 0) {
        note.style.display = 'flex';
        document.getElementById('rsvp-note-text').textContent =
            selfResponded + ' davetli RSVP bağlantısından kendisi yanıtladı';
    } else {
        note.style.display = 'none';
    }
}

// Helpers
function parseLocalDate(s){
    if(!s) return null;
    const [y,m,d] = s.split('-').map(Number);
    if(!y || !m || !d) return null;
    return new Date(y, m-1, d);
}

function fmtDue(d) {
    if (!d) return '';
    const due = parseLocalDate(d);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const diff = Math.round((due - today) / 864e5);
    if (diff < 0) return Math.abs(diff) + ' gün geçti';
    if (diff === 0) return 'Bugün';
    if (diff === 1) return 'Yarın';
    if (diff <= 7) return diff + ' gün sonra';
    if (diff <= 30) return Math.ceil(diff / 7) + ' hafta sonra';
    return Math.ceil(diff / 30) + ' ay sonra';
}

// Gün bazlı geri sayım — sayfa tekrar görünür olduğunda güncelle
document.addEventListener('visibilitychange', () => {
    if (!document.hidden && fh.wedding()) renderHero();
});
</script>
</body>
</html>
