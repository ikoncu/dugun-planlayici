<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Düğün Planlayıcı</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js"></script>
    <script src="./firestore-helpers.js?v=2"></script>
    <script src="./shared-ui.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --gold:#d64f6d;--gold-light:#e8829a;--gold-bg:#fdf2f5;
            --green:#059669;--green-bg:#ecfdf5;
            --red:#dc2626;--red-bg:#fef2f2;
            --blue:#2563eb;--blue-bg:#eff6ff;
            --orange:#ea580c;--orange-bg:#fff7ed;
            --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;
            --gray-400:#9ca3af;--gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;
        }
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}

        /* LOGIN */
        #login-screen{display:none;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1b2a4a,#253a5e,#2f4a7a)}
        .login-card{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:40px 32px;text-align:center;max-width:340px;width:100%;margin:16px}
        .login-card .logo{font-size:48px;margin-bottom:16px}
        .login-card h1{color:white;font-size:22px;font-weight:700;margin-bottom:6px}
        .login-card p{color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:24px}
        .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:white;border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:500;cursor:pointer;width:100%;color:#333;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
        .google-btn svg{width:20px;height:20px;flex-shrink:0}

        /* LOADING */
        #loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;background:var(--gray-50)}
        .spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* APP */
        #app{display:none;padding-bottom:68px}

        /* HEADER */
        .header{background:linear-gradient(135deg,#1b2a4a,#253a5e);color:white;padding:14px 16px 12px;position:sticky;top:0;z-index:50}
        .header-row{display:flex;align-items:center;justify-content:space-between}
        .header h1{font-size:17px;font-weight:700;flex:1;text-align:center}
        .header-logo{text-decoration:none;color:white;font-size:12px;font-weight:600;padding:4px 8px;border:1.5px solid rgba(255,255,255,0.4);border-radius:8px;white-space:nowrap;letter-spacing:1px;width:56px;text-align:center}
        .header-logo:active{opacity:0.7}
        .hamburger{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:4px 8px;width:56px;text-align:center}

        /* TIMELINE */
        .tl-wrap{padding:8px 0 4px;margin-top:4px}
        .tl-track{position:relative;height:52px;margin:0 20px}
        .tl-line{position:absolute;top:8px;left:0;right:0;height:2px;background:rgba(255,255,255,0.12);border-radius:2px}
        .tl-fill{position:absolute;top:8px;left:0;height:2px;background:linear-gradient(90deg,rgba(255,255,255,0.25),#e8829a);border-radius:2px;transition:width 1s}
        .tl-dot{position:absolute;top:9px;transform:translate(-50%,-50%);border-radius:50%;z-index:2}
        .tl-dot.past{width:5px;height:5px;background:rgba(255,255,255,0.2)}
        .tl-dot.today{width:10px;height:10px;background:#d64f6d;border:2px solid white;animation:tlpulse 2s infinite}
        .tl-dot.ms{width:10px;height:10px;border:2px solid #e8829a;background:rgba(255,255,255,0.1)}
        .tl-dot.ms-uncertain{border-style:dashed;border-color:rgba(255,255,255,0.3)}
        @keyframes tlpulse{0%,100%{box-shadow:0 0 4px rgba(214,79,109,0.4)}50%{box-shadow:0 0 12px rgba(214,79,109,0.9)}}
        .tl-lbl{position:absolute;transform:translateX(-50%);text-align:center;white-space:nowrap;top:18px}
        .tl-name{font-size:11px;font-weight:700;color:white;line-height:1.2}
        .tl-date{font-size:9px;color:rgba(255,255,255,0.45)}
        .tl-past-lbl{font-size:7px;color:rgba(255,255,255,0.25)}
        .tl-uncertain .tl-name{color:rgba(255,255,255,0.5);font-style:italic}
        .tl-clickable{cursor:pointer;-webkit-tap-highlight-color:transparent}
        .tl-clickable:active{opacity:0.7}

        /* DASHBOARD CARDS */
        .dash-cards{padding:16px;display:flex;flex-direction:column;gap:14px;max-width:640px;margin:0 auto;padding-bottom:80px}
        .dash-card{background:white;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border:1px solid var(--gray-100)}
        .dash-card-title{font-size:13px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
        .dash-card-title a{font-size:12px;color:var(--gold);text-decoration:none;font-weight:500;text-transform:none;letter-spacing:0}

        /* PROGRESS BAR */
        .progress-wrap{margin-bottom:4px}
        .progress-bar{width:100%;height:8px;background:var(--gray-200);border-radius:4px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light),#e8a0bf);border-radius:4px;transition:width 0.5s}
        .progress-text{display:flex;justify-content:space-between;font-size:12px;color:var(--gray-500);margin-top:4px}

        /* TASK PREVIEW */
        .task-preview{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--gray-100);cursor:pointer}
        .task-preview:last-child{border-bottom:none}
        .tp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .tp-dot.urgent{background:var(--red)}
        .tp-dot.normal{background:var(--orange)}
        .tp-dot.low{background:var(--gray-300)}
        .tp-info{flex:1;min-width:0}
        .tp-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .tp-meta{font-size:11px;color:var(--gray-400)}
        .tp-tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;flex-shrink:0}
        .tp-tag.assignee{background:var(--blue-bg);color:var(--blue)}

        /* MINI STATS */
        .mini-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
        .mini-stat{text-align:center;padding:8px 4px;border-radius:8px;background:var(--gray-50)}
        .mini-stat .ms-num{font-size:20px;font-weight:800}
        .mini-stat .ms-label{font-size:9px;color:var(--gray-500);margin-top:1px}
        .mini-stat.green .ms-num{color:var(--green)}
        .mini-stat.orange .ms-num{color:var(--orange)}
        .mini-stat.red .ms-num{color:var(--red)}
        .mini-stat.blue .ms-num{color:var(--blue)}


        /* VENUE SUMMARY */
        .venue-summary{display:flex;align-items:center;justify-content:space-between}
        .venue-summary .vs-text{font-size:14px;color:var(--gray-700)}
        .venue-summary .vs-text strong{color:var(--gold)}
        .venue-summary a{font-size:13px;color:var(--gold);text-decoration:none;font-weight:600}

        /* EMPTY STATE */
        .empty-state{text-align:center;padding:12px 0;color:var(--gray-400);font-size:13px}

        /* BOTTOM NAV */
        .bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--gray-200);z-index:40;height:56px;padding:6px 0 env(safe-area-inset-bottom)}
        .bnav a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex:1;padding:6px 0;text-decoration:none;color:var(--gray-400);font-size:9px;font-weight:500}
        .bnav a.active{color:var(--gold)}
        .bicon{font-size:20px}

        /* DRAWER */
        .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300}
        .drawer-overlay.open{display:block}
        .drawer{position:fixed;top:0;right:-280px;width:280px;height:100%;background:white;z-index:301;transition:right 0.25s;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,0.15);display:flex;flex-direction:column}
        .drawer.open{right:0}
        .drawer-profile{display:flex;align-items:center;gap:12px;padding:20px 16px;background:linear-gradient(135deg,#1b2a4a,#253a5e);color:white}
        .dp-img{width:40px;height:40px;border-radius:50%;border:2px solid var(--gold-light)}
        .dp-fallback{width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:white}
        .dp-name{font-size:14px;font-weight:600}
        .drawer-spacer{flex:1}
        .drawer-logout{width:calc(100% - 32px);margin:12px 16px;padding:12px;border:1px solid var(--gray-200);border-radius:10px;background:none;color:var(--red);font-size:14px;font-weight:500;cursor:pointer;text-align:center}
        .drawer-logout:active{background:var(--red-bg)}
        .drawer-section{padding:12px 16px 6px;font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.5px}
        .drawer-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--gray-100);text-decoration:none;color:var(--gray-900);font-size:14px;font-weight:500}
        .drawer-item.active{background:var(--gold-bg);color:var(--gold);font-weight:600}
        .di-icon{font-size:18px;width:24px;text-align:center}
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen"></div>

<!-- LOADING -->
<div id="loading-screen" style="display:flex"></div>

<!-- APP -->
<div id="app">
    <div class="header">
        <div class="header-row">
            <a href="index.html" class="header-logo">H 💞 İ</a>
            <h1>Ana Sayfa</h1>
            <button class="hamburger" onclick="UI.toggleDrawer()">☰</button>
        </div>
        <div class="tl-wrap" id="tl-wrap"></div>
        <input type="date" id="date-nisan" style="position:absolute;opacity:0;pointer-events:none;height:0" onchange="changeNisanDate(this.value)">
        <input type="date" id="date-dugun" style="position:absolute;opacity:0;pointer-events:none;height:0" onchange="changeDugunDate(this.value)">
    </div>

    <div class="dash-cards" id="dash-cards">
        <!-- Genel İlerleme -->
        <div class="dash-card">
            <div class="dash-card-title">Genel İlerleme <a href="gorevler.html">Tümü &rarr;</a></div>
            <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
                <div class="progress-text"><span id="prog-label">0 / 0 görev</span><span id="prog-pct">0%</span></div>
            </div>
        </div>

        <!-- Yaklaşan Görevler -->
        <div class="dash-card">
            <div class="dash-card-title">Yaklaşan Görevler <a href="gorevler.html">Tümü &rarr;</a></div>
            <div id="upcoming-tasks"><div class="empty-state">Görev bulunamadı</div></div>
        </div>

        <!-- Davetli Özeti -->
        <div class="dash-card">
            <div class="dash-card-title">Davetli Özeti <a href="davetliler.html">Tümü &rarr;</a></div>
            <div class="mini-stats" id="guest-stats">
                <div class="mini-stat blue"><div class="ms-num" id="gs-total">0</div><div class="ms-label">Toplam Kişi</div></div>
                <div class="mini-stat green"><div class="ms-num" id="gs-confirmed">0</div><div class="ms-label">Katılacak</div></div>
                <div class="mini-stat orange"><div class="ms-num" id="gs-pending">0</div><div class="ms-label">Beklemede</div></div>
                <div class="mini-stat red"><div class="ms-num" id="gs-declined">0</div><div class="ms-label">Katılmayacak</div></div>
            </div>
        </div>

        <!-- Mekan Durumu -->
        <div class="dash-card">
            <div class="dash-card-title">Mekan Durumu <a href="mekanlar.html">Mekanları Gör &rarr;</a></div>
            <div class="venue-summary" id="venue-summary">
                <span class="vs-text">Henüz mekan eklenmedi</span>
            </div>
        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav" id="bnav" style="display:none"></nav>

<script>
// UI inject
UI.injectLogin('Düğün Planlayıcı', 'Düğününüzü birlikte planlayalım');
UI.injectLoading();
UI.injectBnav('index');
UI.injectDrawer('index');

let NISAN_DATE = '2026-05-16';
let WEDDING_DATE = '2026-09-01';

function loadDates() {
    fh.db.collection('shared').doc('dates').get().then(snap => {
        if (snap.exists) {
            if (snap.data().nisan) NISAN_DATE = snap.data().nisan;
            if (snap.data().dugun) WEDDING_DATE = snap.data().dugun;
        }
        updateCountdowns();
    }).catch(() => {});
}

function saveDates() {
    fh.db.collection('shared').doc('dates').set({ nisan: NISAN_DATE, dugun: WEDDING_DATE }, { merge: true }).catch(e => console.error(e));
}

// State
let dashData = { tasks: [], guests: [], venues: [] };

UI.setupAuth({
    onLogin: function() {
        loadDates();
        loadDashboard();
    }
});

// Dashboard Loading — helper üzerinden
function loadDashboard() {
    fh.listen('shared/planner_tasks', (data) => {
        dashData.tasks = (data && data.list) ? data.list : [];
        renderDashboard();
    });

    fh.listen('shared/guests', (data) => {
        dashData.guests = (data && data.list) ? data.list : [];
        renderDashboard();
    });

    fh.listen('shared/venues', (data) => {
        dashData.venues = (data && data.list) ? data.list : [];
        renderDashboard();
    });
}

// Render
function renderDashboard() {
    UI.showApp();
    renderProgress();
    renderUpcomingTasks();
    renderGuestSummary();
    renderVenueSummary();
    updateCountdowns();
}

function renderProgress() {
    const tasks = dashData.tasks;
    let total = 0, done = 0;
    tasks.forEach(t => {
        if (t.subtasks && t.subtasks.length > 0) {
            total += t.subtasks.length;
            done += t.subtasks.filter(s => s.done).length;
        } else {
            total++;
            if (t.done) done++;
        }
    });
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-label').textContent = done + ' / ' + total + ' görev';
    document.getElementById('prog-pct').textContent = pct + '%';
}

function renderUpcomingTasks() {
    const container = document.getElementById('upcoming-tasks');
    const now = new Date();
    const upcoming = dashData.tasks
        .filter(t => !t.done && t.due)
        .sort((a, b) => new Date(a.due) - new Date(b.due))
        .slice(0, 5);

    if (upcoming.length === 0) {
        container.innerHTML = '<div class="empty-state">Yaklaşan görev yok</div>';
        return;
    }

    container.innerHTML = upcoming.map(t => {
        const pClass = t.priority === 'urgent' ? 'urgent' : (t.priority === 'low' ? 'low' : 'normal');
        const assignee = t.assignee ? '<span class="tp-tag assignee">' + UI.esc(trLabel(t.assignee)) + '</span>' : '';
        return '<div class="task-preview" onclick="location.href=\'gorevler.html\'">' +
            '<div class="tp-dot ' + pClass + '"></div>' +
            '<div class="tp-info">' +
                '<div class="tp-title">' + UI.esc(t.title || t.text || '') + '</div>' +
                '<div class="tp-meta">' + fmtDue(t.due) + '</div>' +
            '</div>' +
            assignee +
        '</div>';
    }).join('');
}

function renderGuestSummary() {
    const guests = dashData.guests;
    let total = 0, confirmed = 0, pending = 0, declined = 0;
    guests.forEach(g => {
        const count = (g.total || 1);
        total += count;
        const s = (g.rsvp || '');
        if (s === 'Katilacak') confirmed += count;
        else if (s === 'Katilmayacak') declined += count;
        else pending += count;
    });
    document.getElementById('gs-total').textContent = total;
    document.getElementById('gs-confirmed').textContent = confirmed;
    document.getElementById('gs-pending').textContent = pending;
    document.getElementById('gs-declined').textContent = declined;
}

function renderVenueSummary() {
    const venues = dashData.venues;
    const container = document.getElementById('venue-summary');
    const total = venues.length;
    const favs = venues.filter(v => v.favorite || v.fav).length;
    if (total === 0) {
        container.innerHTML = '<span class="vs-text">Henüz mekan eklenmedi</span>';
    } else {
        container.innerHTML = '<span class="vs-text"><strong>' + total + '</strong> mekan listelendi, <strong>' + favs + '</strong> favori</span>';
    }
}

function updateCountdowns() {
    const now = new Date();
    const nisan = parseLocalDate(NISAN_DATE);
    const dugun = parseLocalDate(WEDDING_DATE);
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

    const nisanDays = Math.max(0, Math.round((nisan - today) / 864e5));
    const dugunDays = Math.max(0, Math.round((dugun - today) / 864e5));

    // Sabit pozisyonlar: gorsel netlik icin
    // Sol: 1 hafta once (3%), Bugun (12%), Nisan (55%), Dugun (93%)
    const todayPos = 12;
    const nisanPos = 55;
    const dugunPos = 93;

    const wrap = document.getElementById('tl-wrap');
    wrap.innerHTML = '<div class="tl-track">'
        + '<div class="tl-line"></div>'
        + '<div class="tl-fill" style="width:'+todayPos+'%"></div>'
        // 1 hafta once - sadece nokta
        + '<div class="tl-dot past" style="left:2%"></div>'
        // Bugün
        + '<div class="tl-dot today" style="left:'+todayPos+'%"></div>'
        + '<div class="tl-lbl" style="left:'+todayPos+'%"><div class="tl-name" style="color:rgba(255,255,255,0.8)">Bugün</div><div class="tl-date">'+now.getDate()+' '+['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'][now.getMonth()]+'</div></div>'
        // Nisan - tiklanabilir
        + '<div class="tl-dot ms" style="left:'+nisanPos+'%"></div>'
        + '<div class="tl-lbl tl-clickable" style="left:'+nisanPos+'%" onclick="openDatePicker(\'nisan\')">'
        +   '<div class="tl-name">'+fmtDateShort(NISAN_DATE)+'</div>'
        +   '<div class="tl-date">Nişan · '+nisanDays+' gün</div>'
        + '</div>'
        // Dugun - tiklanabilir
        + '<div class="tl-dot ms ms-uncertain" style="left:'+dugunPos+'%"></div>'
        + '<div class="tl-lbl tl-uncertain tl-clickable" style="left:'+dugunPos+'%" onclick="openDatePicker(\'dugun\')">'
        +   '<div class="tl-name">'+fmtDateShort(WEDDING_DATE)+' ~</div>'
        +   '<div class="tl-date">Düğün · ~'+dugunDays+' gün</div>'
        + '</div>'
        + '</div>';
}

// Timeline tarih formatlama (local timezone)
function fmtDateShort(dateStr) {
    const d = parseLocalDate(dateStr) || new Date(dateStr);
    const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    return d.getDate() + ' ' + months[d.getMonth()];
}

// Takvim ac
function openDatePicker(type) {
    const inp = document.getElementById('date-' + type);
    inp.value = type === 'nisan' ? NISAN_DATE : WEDDING_DATE;
    inp.style.pointerEvents = 'auto';
    inp.showPicker ? inp.showPicker() : inp.click();
    setTimeout(() => { inp.style.pointerEvents = 'none'; }, 100);
}

function fmtDateLong(d){
    const date = new Date(d);
    const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    return date.getDate()+' '+months[date.getMonth()]+' '+date.getFullYear();
}

function changeNisanDate(val) {
    if (!val) return;
    if (val === NISAN_DATE) return;
    // Validate: gecmiş tarih degil
    const today = new Date();
    today.setHours(0,0,0,0);
    const newDate = new Date(val);
    if(newDate < today){
        if(!confirm('Seçtiğiniz tarih geçmişte. Yine de '+fmtDateLong(val)+' olarak güncellensin mi?')){
            return;
        }
    }
    // Validate: dugun tarihinden once
    if(WEDDING_DATE && newDate >= new Date(WEDDING_DATE)){
        alert('Nişan tarihi düğün tarihinden önce olmalı.');
        return;
    }
    if(!confirm('Nişan tarihi '+fmtDateLong(NISAN_DATE)+' iken '+fmtDateLong(val)+' olarak değiştirilecek. Onaylıyor musunuz?')){
        return;
    }
    NISAN_DATE = val;
    saveDates();
    updateCountdowns();
}

function changeDugunDate(val) {
    if (!val) return;
    if (val === WEDDING_DATE) return;
    const today = new Date();
    today.setHours(0,0,0,0);
    const newDate = new Date(val);
    if(newDate < today){
        if(!confirm('Seçtiğiniz tarih geçmişte. Yine de '+fmtDateLong(val)+' olarak güncellensin mi?')){
            return;
        }
    }
    // Validate: nisan tarihinden sonra
    if(NISAN_DATE && newDate <= new Date(NISAN_DATE)){
        alert('Düğün tarihi nişan tarihinden sonra olmalı.');
        return;
    }
    if(!confirm('Düğün tarihi '+fmtDateLong(WEDDING_DATE)+' iken '+fmtDateLong(val)+' olarak değiştirilecek. Onaylıyor musunuz?')){
        return;
    }
    WEDDING_DATE = val;
    saveDates();
    updateCountdowns();
}

// Helpers
function parseLocalDate(s){
    if(!s) return null;
    const [y,m,d] = s.split('-').map(Number);
    return new Date(y, m-1, d);
}

function fmtDue(d) {
    if (!d) return '';
    const due = parseLocalDate(d);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const diff = Math.round((due - today) / 864e5);
    if (diff < 0) return Math.abs(diff) + ' gün geçti';
    if (diff === 0) return 'Bugün';
    if (diff === 1) return 'Yarın';
    if (diff <= 7) return diff + ' gün sonra';
    if (diff <= 30) return Math.ceil(diff / 7) + ' hafta sonra';
    return Math.ceil(diff / 30) + ' ay sonra';
}


// Veri degeri -> Turkce gosterim
function trLabel(s){return UI.trLabel(s);}

// Gün bazlı geri sayım — sayfa tekrar görünür olduğunda güncelle (polling yok)
document.addEventListener('visibilitychange', () => {
    if (!document.hidden) updateCountdowns();
});
