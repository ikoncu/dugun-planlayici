<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Düğün Planlayıcı — Yeni Adres</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1b2a4a,#253a5e,#2f4a7a);color:white;text-align:center;padding:20px}
        .card{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:40px 32px;max-width:380px;width:100%}
        .logo{font-size:32px;margin-bottom:12px}
        h1{font-size:20px;font-weight:700;margin-bottom:8px}
        p{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:24px;line-height:1.5}

        /* Ana buton: progress bar dolarak yönlendirme */
        .btn-redirect{position:relative;display:block;width:100%;padding:14px 24px;background:rgba(214,79,109,0.25);color:white;text-decoration:none;border-radius:12px;font-weight:600;font-size:15px;overflow:hidden;border:2px solid #d64f6d}
        .btn-redirect:active{opacity:0.9}
        .btn-fill{position:absolute;top:0;left:0;height:100%;width:0;background:#d64f6d;border-radius:10px;transition:width 10s linear;z-index:0}
        .btn-text{position:relative;z-index:1}

        /* Hemen git linki */
        .skip-link{display:inline-block;margin-top:16px;font-size:13px;color:rgba(255,255,255,0.5);text-decoration:underline;text-underline-offset:3px}
        .skip-link:hover,.skip-link:active{color:white}

        .hint{font-size:11px;color:rgba(255,255,255,0.25);margin-top:20px}
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💍</div>
        <h1>Taşındık!</h1>
        <p>Düğün Planlayıcı yeni adresine taşındı.</p>
        <a class="btn-redirect" id="btn" href="https://dugun-planlayici-ff34e.web.app">
            <div class="btn-fill" id="fill"></div>
            <span class="btn-text" id="btn-text">Yönlendiriliyor... 10</span>
        </a>
        <a class="skip-link" href="https://dugun-planlayici-ff34e.web.app">Hemen git &rarr;</a>
        <div class="hint">dugun-planlayici-ff34e.web.app</div>
    </div>
    <script>
        var seconds = 10;
        var fill = document.getElementById('fill');
        var btnText = document.getElementById('btn-text');

        // Progress bar'i baslat
        requestAnimationFrame(function(){
            fill.style.width = '100%';
        });

        // Geri sayim
        var timer = setInterval(function(){
            seconds--;
            if(seconds > 0){
                btnText.textContent = 'Yönlendiriliyor... ' + seconds;
            } else {
                clearInterval(timer);
                btnText.textContent = 'Yönlendiriliyor...';
                window.location.href = 'https://dugun-planlayici-ff34e.web.app';
            }
        }, 1000);
    </script>
</body>
</html>
